<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capitulation Indicator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef0f3;
    --card:#ffffff;
    --border:#e4e7ec;
    --ink:#1c2c47;
    --ink-soft:#5b6b85;
    --muted:#9aa6b8;
    --eyebrow:#8a97ab;
    --accent:#2f6bff;
    --red:#d8433b;
    --green:#1fa06a;
    --track:#eaecef;
    --zone-red:rgba(216,67,59,.12);
    --zone-green:rgba(31,160,106,.14);
    --radius:16px;
    --shadow:0 1px 2px rgba(24,44,71,.04), 0 6px 24px rgba(24,44,71,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:32px 20px;
  }
  .wrap{width:100%;max-width:860px;display:flex;flex-direction:column;gap:20px}
  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);
    padding:24px 28px;
  }
  .eyebrow{
    font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--eyebrow);margin-bottom:22px;
  }

  /* ---------- Горизонтальная шкала ---------- */
  .gauge .eyebrow{text-align:center}
  .gauge-body{padding:0 6px}
  .htrack-wrap{position:relative;padding-top:44px}   /* место под маркер */
  .htrack{
    position:relative;width:100%;height:8px;border-radius:99px;background:var(--track);
    overflow:visible;
  }
  .htrack::before,.htrack::after{
    content:"";position:absolute;top:0;bottom:0;width:14%;border-radius:99px;
  }
  .htrack::before{left:0;background:var(--zone-green)}   /* пик / страх */
  .htrack::after{right:0;background:var(--zone-red)}     /* жадность */
  .peak-label{
    position:absolute;left:0;top:16px;
    font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--green);
  }
  /* точка на треке */
  .htrack-dot{
    position:absolute;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);
    border-radius:50%;background:var(--accent);border:2.5px solid #fff;
    box-shadow:0 1px 5px rgba(47,107,255,.45);z-index:2;
  }
  /* маркер над треком */
  .hmarker{
    position:absolute;top:0;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;
  }
  .hmarker .val{
    font-size:20px;font-weight:700;color:var(--accent);
    font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1;
  }
  .hmarker .tri{
    width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;
    border-top:9px solid var(--accent);
    filter:drop-shadow(0 1px 1px rgba(47,107,255,.35));
  }
  .hscale{
    display:flex;justify-content:space-between;margin-top:14px;
    font-size:11px;font-weight:500;color:var(--muted);font-variant-numeric:tabular-nums;
  }

  /* ---------- Компоненты ---------- */
  .rows{display:flex;flex-direction:column;gap:4px}
  .row{
    display:grid;grid-template-columns:112px 1fr 46px;align-items:center;
    column-gap:18px;padding:9px 0;
  }
  .row .name{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .row .value{
    font-size:14px;font-weight:600;text-align:right;
    color:var(--ink-soft);font-variant-numeric:tabular-nums;
  }
  .row.na .value{color:var(--muted);font-weight:500}
  .row.na .na-text{font-size:13px;font-weight:500;color:var(--muted)}

  .bar{
    position:relative;height:8px;border-radius:99px;
    background:linear-gradient(90deg,var(--red) 0%,#e6a24a 30%,#eceff2 50%,#63c79a 70%,var(--green) 100%);
  }
  .bar .zero{
    position:absolute;left:50%;top:-3px;bottom:-3px;width:1.5px;transform:translateX(-50%);
    background:rgba(28,44,71,.16);border-radius:2px;
  }
  .bar .handle{
    position:absolute;top:50%;width:5px;height:20px;transform:translate(-50%,-50%);
    background:var(--accent);border-radius:4px;border:1.5px solid #fff;
    box-shadow:0 1px 3px rgba(47,107,255,.4),0 0 0 1px rgba(47,107,255,.15);
  }

  @media(max-width:560px){
    .row{grid-template-columns:92px 1fr 42px;column-gap:12px}
    .row .name{font-size:15px}
    .row.na .na-text{font-size:12px}
  }
</style>
</head>
<body>
  <div class="wrap">

    <!-- Горизонтальный индикатор -->
    <section class="card gauge">
      <div class="eyebrow">Индикатор</div>
      <div class="gauge-body">
        <div class="htrack-wrap">
          <div class="htrack">
            <!-- +3.7 → (3.7+10)/20 = 68.5% -->
            <div class="htrack-dot" style="left:68.5%"></div>
            <span class="peak-label">пик</span>
          </div>
          <div class="hmarker" style="left:68.5%">
            <span class="val">+3.7</span><span class="tri"></span>
          </div>
        </div>
        <div class="hscale">
          <span>−10</span><span>−8</span><span>−6</span><span>−4</span><span>−2</span>
          <span>0</span>
          <span>+2</span><span>+4</span><span>+6</span><span>+8</span><span>+10</span>
        </div>
      </div>
    </section>

    <!-- Компоненты -->
    <section class="card components">
      <div class="eyebrow">Значения компонентов: −10 — страх … +10 — жадность</div>
      <div class="rows">

        <div class="row">
          <span class="name">VIX</span>
          <div class="bar"><span class="zero"></span><span class="handle" style="left:56%"></span></div>
          <span class="value">+1.2</span>
        </div>

        <div class="row">
          <span class="name">VIX/VIX3M</span>
          <div class="bar"><span class="zero"></span><span class="handle" style="left:77%"></span></div>
          <span class="value">+5.4</span>
        </div>

        <div class="row">
          <span class="name">NAAIM</span>
          <div class="bar"><span class="zero"></span><span class="handle" style="left:73%"></span></div>
          <span class="value">+4.6</span>
        </div>

        <div class="row na">
          <span class="name">Baa−10Y</span>
          <span class="na-text">источник недоступен</span>
          <span class="value">n/a</span>
        </div>

        <div class="row na">
          <span class="name">P/C equity</span>
          <span class="na-text">источник недоступен</span>
          <span class="value">n/a</span>
        </div>

        <div class="row na">
          <span class="name">P/C total</span>
          <span class="na-text">источник недоступен</span>
          <span class="value">n/a</span>
        </div>

        <div class="row na">
          <span class="name">AAII</span>
          <span class="na-text">источник недоступен</span>
          <span class="value">n/a</span>
        </div>

      </div>
    </section>

  </div>
</body>
</html>
