<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbell · TQQQ + QDTE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#FFFFFF;
    --ink:#1a1a1a;
    --muted:#9a9a9a;

    --ms-blue:#00A4EF;
    --ms-green:#7FBA00;
    --ms-yellow:#FFB900;   --yellow-ink:#6E4A00;
    --ms-red:#F25022;

    --cell:112px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--page);
    font-family:'Space Grotesk',system-ui,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding:40px 20px;
  }
  .wrap{max-width:712px;margin:0 auto}

  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px}
  .head h1{font-size:26px;font-weight:300;margin:0;letter-spacing:.01em}
  .mark{
    width:26px;height:26px;flex:none;align-self:center;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
  }
  .mark span{display:block}
  .mark .s1{background:#F25022}
  .mark .s2{background:#7FBA00}
  .mark .s3{background:#00A4EF}
  .mark .s4{background:#FFB900}

  .grid{
    display:grid;
    grid-template-columns:repeat(6,var(--cell));
    grid-template-rows:repeat(3,var(--cell));
    gap:8px;
    justify-content:center;
  }

  .tile{
    position:relative;
    display:flex;flex-direction:column;justify-content:flex-end;
    text-decoration:none;
    border-radius:0;
    padding:18px;
    transition:filter .12s ease, transform .12s ease;
  }
  a.tile:hover{filter:brightness(1.07);transform:translateY(-1px)}
  a.tile:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

  .cap{
    font-size:16px;font-weight:700;color:#fff;line-height:1.18;
  }
  .sub{
    font-size:10.5px;color:rgba(255,255,255,.82);margin-bottom:4px;line-height:1.25;
  }

  .t-main{grid-column:1/3;grid-row:1/3;background:var(--ms-blue)}
  .t-gex{grid-column:5/7;grid-row:1;background:var(--ms-yellow)}
  .t-gex .cap{color:var(--yellow-ink)}
  .t-gex .sub{color:rgba(90,60,0,.8)}
  .t-bottom{grid-column:3/5;grid-row:3;background:var(--ms-green)}

  .tile.t-tott{grid-column:5/7;grid-row:2;background:var(--ms-red)}

  .deco{border-radius:0}
  .d-emerald{grid-column:3/5;grid-row:1;background:var(--ms-green)}
  .d-gold{grid-column:3;grid-row:2;background:var(--ms-yellow)}
  .d-blue1{grid-column:4;grid-row:2;background:var(--ms-blue)}
  .d-lime{grid-column:1;grid-row:3;background:var(--ms-green)}
  .d-violet{grid-column:2;grid-row:3;background:var(--ms-red)}
  .d-blue2{grid-column:6;grid-row:3;background:var(--ms-blue)}

  .cluster{
    grid-column:5;grid-row:3;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;
  }
  .cluster span{display:block}
  .cluster .c1{background:var(--ms-yellow)}
  .cluster .c2{background:var(--ms-blue)}
  .cluster .c3{background:var(--ms-red)}
  .cluster .c4{background:var(--ms-green)}

  .foot{display:flex;align-items:center;gap:8px;margin-top:22px;justify-content:center}
  .foot .dot{width:7px;height:7px;background:var(--ms-yellow);flex:none}
  .foot > span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

  @media (max-width:780px){
    :root{--cell:calc((100vw - 80px)/6)}
    .cap{font-size:13px}
    .sub{font-size:9.5px}
  }
  @media (max-width:520px){
    :root{--cell:calc((100vw - 48px)/2)}
    .grid{
      grid-template-columns:repeat(2,var(--cell));
      grid-template-rows:repeat(9,var(--cell));
    }
    .cap{font-size:12.5px}
    .t-main{grid-column:1/3;grid-row:1/3}
      .t-gex{grid-column:1/3;grid-row:3}
    .t-tott{grid-column:1/3;grid-row:4}
    .t-bottom{grid-column:1/3;grid-row:5}
    .d-emerald{grid-column:1;grid-row:6}
    .d-gold{grid-column:2;grid-row:6}
    .d-blue1{grid-column:1;grid-row:7}
    .d-lime{grid-column:2;grid-row:7}
    .d-violet{grid-column:1;grid-row:8}
    .d-blue2{grid-column:2;grid-row:8}
    .cluster{grid-column:1/3;grid-row:9}
  }

</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <h1>SPICY Investments Inc.</h1>
    <div class="mark" aria-hidden="true">
      <span class="s1"></span><span class="s2"></span>
      <span class="s3"></span><span class="s4"></span>
    </div>
  </div>

  <div class="grid">

    <a class="tile t-main" href="advisor.html">
      <div class="sub">пятничная проверка крыльев</div>
      <div class="cap">Main Strategy</div>
    </a>

    <div class="deco d-emerald" aria-hidden="true"></div>

    <a class="tile t-gex" href="gex.html">
      <div class="sub">уровни дилеров · zero-gamma</div>
      <div class="cap">GEX — дилерская гамма</div>
    </a>

    <a class="tile t-tott" href="tott.html">
      <div class="sub">детектор вершины</div>
      <div class="cap">Top of the Top</div>
    </a>
    <div class="deco d-gold" aria-hidden="true"></div>
    <div class="deco d-blue1" aria-hidden="true"></div>
    <div class="deco d-lime" aria-hidden="true"></div>
    <div class="deco d-violet" aria-hidden="true"></div>

    <a class="tile t-bottom" href="bottom.html">
      <div class="sub">сигналы капитуляции</div>
      <div class="cap">Индикатор дна</div>
    </a>

    <div class="cluster" aria-hidden="true">
      <span class="c1"></span><span class="c2"></span>
      <span class="c3"></span><span class="c4"></span>
    </div>

    <div class="deco d-blue2" aria-hidden="true"></div>

  </div>

  <div class="foot">
    <span class="dot" aria-hidden="true"></span>
    <span>Spicy Investments Inc. · © <span id="yr"></span></span>
  </div>

</div>
<script>document.getElementById('yr').textContent=new Date().getFullYear();</script>
</body>
</html>
