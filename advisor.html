<style>
/* ===== Metro-стиль · Barbell ===== */
:root{
  --sans:'Space Grotesk',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --ink:#1a1a1a; --sec:#767676; --muted:#9a9a9a; --rule:#EDEDED;

  --blue:#00A4EF; --violet:#7550BE; --green:#7FBA00; --yellow:#FFB900;

  --acc:#0084C0;
  --ok:#4C8A00;   --ok-dot:#7FBA00;   --ok-bg:transparent;
  --warn:#C29B00; --warn-dot:#F0B400; --warn-bg:transparent;
  --red:#D24726;  --red-dot:#D24726;  --red-bg:#FBF1EF;
  --bear:#8E2A9E; --bear-dot:#AA00CC; --bear-bg:transparent;
  --card:#F8F8F8; --surf:transparent;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:#fff;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;padding:34px 20px}
.wrap{max-width:760px;margin:0 auto}

a{color:inherit}
.back{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;margin-bottom:14px}
.back:hover{color:var(--ink)}

.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.tleft{display:flex;align-items:center;gap:10px}
.tbadge{width:30px;height:30px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:none}
.home{font-size:22px;font-weight:300;letter-spacing:.01em;text-decoration:none;color:var(--ink)}
.meta{font-family:var(--mono);font-size:11px;color:var(--muted)}

.rule4{height:2px;background:linear-gradient(to right,var(--blue) 0 25%,var(--green) 25% 50%,var(--yellow) 50% 75%,var(--violet) 75% 100%);margin-bottom:14px}

.warnbar{background:var(--red-bg);border-left:3px solid var(--red);color:var(--red);padding:11px 15px;font-size:.9rem;margin-bottom:15px;display:none}
.livehint{color:#D24726;font-size:.78rem;line-height:1.45;margin-top:12px}

/* сводка QQQ + мастер-статус */
.hdrline{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.hnums{font-family:var(--mono);font-size:.8rem;color:var(--sec)}

.hnums .live{color:var(--blue);font-weight:500}

/* мастер-статус: квадратик + цветной текст, без плашки */
.badge{display:inline-flex;align-items:center;gap:7px;font-size:.85rem;font-weight:700;padding:0;background:none}
.badge .dot{width:9px;height:9px;border-radius:0}
.b-ok{color:var(--ok)} .b-ok .dot{background:var(--ok-dot)}

.bs-ok{color:var(--ok)} .bs-ok .dot{background:var(--ok-dot)}
.bs-warn{color:var(--warn)} .bs-warn .dot{background:var(--warn-dot)}
.bs-red{color:var(--red)} .bs-red .dot{background:var(--red-dot)}

/* плашка режима → тонкий кант слева */
.regime{border-left:3px solid var(--blue);padding:8px 14px;margin-bottom:26px}
.regime .t{font-size:.9rem;font-weight:700;color:var(--ink)}

/* крылья: без карточек, маркер + подчёркивание */
.wing{padding:0;margin:0}
.wing-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;gap:10px;flex-wrap:wrap;position:relative;padding-bottom:10px}
.wing-head::after{content:'';position:absolute;left:0;bottom:0;width:64px;height:2px}
.wing-tq .wing-head::after{background:var(--blue)}

.wing-title{font-size:16px;font-weight:700;letter-spacing:.01em;display:inline-flex;align-items:center}

.wing-nums b{color:var(--ink);font-weight:500}
.wing-nums .ref{color:var(--muted)}

/* разделитель-штанга между крыльями */
.wingsep{display:flex;align-items:center;gap:14px;margin:34px 0}
.wingsep::before,.wingsep::after{content:'';flex:1;height:1px;background:#E4E4E4}
.wingsep .w1,.wingsep .w2{width:9px;height:9px;flex:none}
.wingsep .w1{background:var(--blue);margin-right:-11px}
.wingsep .w2{background:var(--violet)}

.wing-grid{display:grid;grid-template-columns:minmax(0,250px) minmax(0,1fr);gap:22px;align-items:start}
@media(max-width:660px){.wing-grid{grid-template-columns:1fr;gap:16px}}

/* левая колонка — уровни */
.lvls{font-family:var(--mono);font-size:.75rem}
.lvls .h{display:grid;grid-template-columns:1fr auto;gap:10px;padding:0 0 5px;color:var(--muted);font-size:.66rem}
.lvls .h.q{grid-template-columns:1fr auto auto;gap:12px}
.lvls .l{display:grid;grid-template-columns:1fr auto;gap:10px;padding:6px 0;border-top:1px solid var(--rule);align-items:center}
.lvls .l.q{grid-template-columns:1fr auto auto;gap:12px}
.lvls .l > span:first-child::before{content:'';display:inline-block;width:8px;height:8px;margin-right:7px;background:currentColor;vertical-align:-1px}
.lvls .l > span:first-child.c-m::before{background:#C8C8C8}
.lvls .paren{color:var(--muted)}
.c-cur{color:var(--acc)} .c-y{color:var(--warn)} .c-r{color:var(--red)} .c-b{color:var(--bear)} .c-ok{color:var(--ok)} .c-m{color:var(--sec)}

/* правая колонка — карточка состояния */
.scard{background:var(--card);border-top:2px solid var(--blue);padding:12px 14px}
.wing-qd .scard{border-top-color:var(--violet)}
.scard .st{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.scard .st .dot{width:9px;height:9px;border-radius:0;margin-top:5px;flex:0 0 auto}
.scard .st .lb{font-size:.9rem;font-weight:700;line-height:1.4}

.scard .ind b{color:var(--ink);font-weight:500}
.scard .act{margin-top:11px;padding-top:10px;border-top:1px solid var(--rule);font-size:.82rem;color:var(--ink)}
.scard .act b{font-weight:700}

/* здоровье выплат — нейтральное */
.health{margin-top:14px}
.health-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.health-head .t{font-size:.82rem;color:var(--ink);font-weight:700;letter-spacing:.01em}
.health-cells{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.hc{background:var(--card);padding:10px;text-align:left}
.hc .n{font-family:var(--mono);font-size:.95rem;font-weight:500}
.hc .c{font-size:.68rem;color:var(--muted);margin-top:3px}

/* плейсхолдер загрузки */
.loading{min-height:260px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;color:var(--muted)}

/* подвал */
.foot{margin-top:26px}
.footline{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.fbrand{display:flex;align-items:center;gap:9px}
.fmark{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1.5px;width:18px;height:18px}
.fmark span{display:block}
.fmark .m1{background:#F25022}.fmark .m2{background:#7FBA00}
.fmark .m3{background:#00A4EF}.fmark .m4{background:#FFB900}
.fname{font-size:13px;font-weight:700;color:var(--ink)}
.fyear{font-family:var(--mono);font-size:10.5px;color:#B4B4B4}
</style>

<script>
'use strict';
const $=id=>document.getElementById(id);

/* уровни просадки: множитель к ATH и подпись в % */
const MULT={yellow:0.947,exit:0.888,t1:0.794,t2:0.705,t3:0.585,bear:0.80};
const DD={yellow:-5.3,exit:-11.2,t1:-20.6,t2:-29.5,t3:-41.5,bear:-20.0};

/* параметры модуля аллокации (порт из бэктеста v2.2) */
const MOD={ENTER:0.009,EXIT:0.004,CIN:5,COUT:3,DOX:0.20,DREL:0.18,DRET:0.12,CRET:3,YEL:-0.053,RED:-0.112,SW:10};
const W20='TQQQ 20% / QDTE 80%';      // разгрузка (растяжение)
const W40='TQQQ 40% / QDTE 60%';      // база
const W60='TQQQ 60% / QDTE 40%';      // разгон

function log(s){ if(window.console) console.log(s); }

/* форматирование */
const fmt=x=>'$'+x.toFixed(2), f1=x=>'$'+x.toFixed(1);
const pc1=x=>(x>=0?'+':'−')+Math.abs(x).toFixed(1)+'%';   // из числа-процента
const pc2=x=>(x>=0?'+':'−')+Math.abs(x).toFixed(2)+'%';

/* ---- данные через бэкенд Tiingo (ключ на сервере) ---- */
async function getData(sym,start){
  const url=`/api/tiingo?symbol=${encodeURIComponent(sym)}&start=${start||'1999-01-01'}`;
  const r=await fetch(url);
  const js=await r.json();
  if(!r.ok||js.error){throw new Error(js.error?`${sym}: ${js.error}`:`${sym}: HTTP ${r.status}`);}
  if(!Array.isArray(js)||!js.length)throw new Error(`${sym}: пустой ответ`);
  const rows=js.map(x=>({d:x.date.slice(0,10),o:+x.open,h:+x.high,l:+x.low,c:+x.close,
    adj:(x.adjClose!=null?+x.adjClose:+x.close),div:(+x.divCash||0)}));
  log(`${sym}: ${rows.length} дн., бар ${rows[rows.length-1].d} (Tiingo)`);
  return rows;
}

/* ---- живая (внутридневная) цена через IEX ---- */
async function getLive(sym){
  const r=await fetch(`/api/tiingo?symbol=${encodeURIComponent(sym)}&mode=iex`);
  const js=await r.json();
  if(!r.ok||js.error)throw new Error(js.error?`${sym} live: ${js.error}`:`${sym} live: HTTP ${r.status}`);
  const q=Array.isArray(js)?js[0]:js;
  const p=q&&(q.tngoLast!=null?q.tngoLast:(q.last!=null?q.last:q.prevClose));
  if(p==null||!isFinite(+p))throw new Error(`${sym} live: нет цены`);
  log(`${sym}: живая ${(+p).toFixed(2)} (IEX)`);
  return +p;
}

/* ---- ISO-неделя ---- */
function isoWeekKey(dt){
  const day=(dt.getUTCDay()+6)%7,th=new Date(dt);th.setUTCDate(dt.getUTCDate()-day+3);
  const y=th.getUTCFullYear(),j4=new Date(Date.UTC(y,0,4));
  const w=1+Math.round(((th-j4)/864e5-3+((j4.getUTCDay()+6)%7))/7);
  return y*100+w;
}

/* ---- индикаторы (порт из бэктеста, сверено с TradingView) ---- */
function ewm(a,al){const o=new Array(a.length);let s=a[0]||0;o[0]=s;for(let i=1;i<a.length;i++){s=al*a[i]+(1-al)*s;o[i]=s;}return o;}
function smaArr(a,n){const o=new Array(a.length).fill(NaN);let s=0;for(let i=0;i<a.length;i++){s+=a[i];if(i>=n)s-=a[i-n];if(i>=n-1)o[i]=s/n;}return o;}
function cummax(a){const o=new Array(a.length);let m=-Infinity;for(let i=0;i<a.length;i++){m=Math.max(m,a[i]);o[i]=m;}return o;}
/* ADX/CHOP как полные ряды (не только текущее значение) — нужны для прогона машины
   ядра по недельным барам истории, а не только «сейчас». */
function taSeries(rows,n=14){
  const N=rows.length,tr=new Array(N).fill(0),pdm=new Array(N).fill(0),mdm=new Array(N).fill(0);
  for(let i=1;i<N;i++){const h=rows[i].h,l=rows[i].l,pc=rows[i-1].c;
    tr[i]=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
    const up=h-rows[i-1].h,dn=rows[i-1].l-l;pdm[i]=(up>dn&&up>0)?up:0;mdm[i]=(dn>up&&dn>0)?dn:0;}
  const a=1/n,atr=ewm(tr,a),pd=ewm(pdm,a),md=ewm(mdm,a),dx=new Array(N).fill(0);
  for(let i=0;i<N;i++){const p=100*pd[i]/(atr[i]||1e-9),m=100*md[i]/(atr[i]||1e-9);dx[i]=(p+m)?100*Math.abs(p-m)/(p+m):0;}
  const adxArr=ewm(dx,a),chopArr=new Array(N).fill(NaN);
  for(let i=n-1;i<N;i++){let s=0,hi=-1e9,lo=1e9;for(let j=i-n+1;j<=i;j++){s+=tr[j];hi=Math.max(hi,rows[j].h);lo=Math.min(lo,rows[j].l);}chopArr[i]=100*Math.log10(s/(hi-lo))/Math.log10(n);}
  return{adxArr,chopArr,adx:adxArr[N-1],chop:chopArr[N-1]};
}
function weeklyCloses(rows){const wk=[];let cur=null,last=null;
  for(let i=0;i<rows.length;i++){const r=rows[i];const dt=new Date(r.d+'T12:00:00Z');
    const day=(dt.getUTCDay()+6)%7,th=new Date(dt);th.setUTCDate(dt.getUTCDate()-day+3);
    const y=th.getUTCFullYear(),j4=new Date(Date.UTC(y,0,4));
    const w=1+Math.round(((th-j4)/864e5-3+((j4.getUTCDay()+6)%7))/7),key=y*100+w;
    if(key!==cur){if(last)wk.push(last);cur=key;}last={key,c:r.c,d:r.d,i};}
  if(last)wk.push(last);return wk;}

/* ---- МАШИНА СОСТОЯНИЙ МОДУЛЯ (порт run_module из бэктеста + разгрузка v2.2) ----
   Прогон по дневным закрытиям QQQ. Три аллокационных состояния:
     RISKOFF = 20/80 (растяжение), BASE = 40/60 (по умолчанию), RISKON = 60/40 (тренд).
   Переходы: D≥20% → RISKOFF немедленно (из любого состояния); RISKOFF→BASE при D<12%
   три закрытия подряд; латч растяжения (20/18) блокирует вход в разгон; наклон EMA20
   двигает BASE↔RISKON (подтверждения 5/3). Красный/жёлтый в приоритете.
   Вес — чистая функция state: RISKOFF 20, BASE 40, RISKON 60. */
function runModule(closes,ema20,sma200){
  const N=closes.length,{ENTER,EXIT,CIN,COUT,DOX,DREL,DRET,CRET,YEL,RED,SW}=MOD;
  let state='BASE',ci=0,co=0,cr=0,pending=null,overext=false,ath=-Infinity,prev='BASE';
  let out=null;
  for(let i=0;i<N;i++){
    ath=Math.max(ath,closes[i]);
    const dd=closes[i]/ath-1;
    const slope=(i>=SW&&ema20[i-SW])?ema20[i]/ema20[i-SW]-1:NaN;
    const D=sma200[i]?closes[i]/sma200[i]-1:NaN;
    if(!isNaN(D)){if(D>=DOX)overext=true;else if(D<DREL)overext=false;}
    prev=state;
    let ns;
    if(dd<=RED){ns='CORE_OFF';ci=co=cr=0;pending=null;}
    else if(dd<=YEL){ns='BASE';ci=co=cr=0;pending=null;}                 // жёлтый → база
    else if(!isNaN(D)&&D>=DOX){ns='RISKOFF';ci=co=cr=0;pending=null;}     // растяжение → разгрузка
    else{
      ns=(state==='CORE_OFF')?'BASE':state;
      if(ns==='RISKOFF'){                                                // выход из разгрузки: D<12% ×3
        if(!isNaN(D)&&D<DRET){cr++;if(cr>=CRET){ns='BASE';cr=0;}}
        else cr=0;
      }else if(ns==='BASE'){
        const want=(!isNaN(slope)&&slope>ENTER&&!overext)?'RISKON':null;
        if(want&&want===pending)ci++;
        else if(want){pending=want;ci=1;}
        else{pending=null;ci=0;}
        if(pending&&ci>=CIN){ns=pending;pending=null;ci=0;}
      }else if(ns==='RISKON'){
        if(!isNaN(slope)&&slope<EXIT){co++;if(co>=COUT){ns='BASE';co=0;}}
        else co=0;
      }
    }
    state=ns;
    out={state,prev,ci,co,cr,pending,slope,D,dd,overext};
  }
  return out;
}

/* ---- ВИД КАРТОЧКИ МОДУЛЯ (стандартный режим) ----
   Приоритет: жёлтая зона → опасное отклонение → фаза тренда.
   ddFrac — живая просадка (доля), m — состояние последнего бара. */
function moduleView(m,ddFrac){
  const sl=m.slope*100, D=m.D*100;
  const DOT={acc:'var(--acc)',base:'var(--sec)',warn:'var(--warn-dot)',ok:'var(--ok-dot)'};
  const COL={acc:'var(--acc)',base:'var(--sec)',warn:'var(--warn)',ok:'var(--ok)'};
  const wOf=s=>({RISKOFF:20,BASE:40,RISKON:60,CORE_OFF:40})[s]||40;
  const rebal=wOf(m.state)!==wOf(m.prev);               // вес изменился на этом баре → прямой ребаланс
  let label,dot,col,dist,ind,act;

  if(ddFrac<=MOD.YEL){                                   // жёлтая зона → база 40/60
    label='жёлтая зона';dot=DOT.warn;col=COL.warn;dist=W40;
    ind=[`просадка QQQ <b>${pc1(ddFrac*100)}</b> ≤ −5,3% — принудительная база`,`сигнал наклона игнорируется`];
    act=W40;
  }else if(m.state==='RISKOFF'){                         // разгрузка 20/80
    dist=W20;dot=DOT.warn;col=COL.warn;
    if(m.cr>0){                                          // растяжение спадает → база
      label='растяжение спадает → база';
      ind=[`отклонение от SMA200 <b>${pc1(D)}</b> &lt; 12%`,`возврат из разгрузки: <b>${m.cr}</b> из 3`];
      act=W20+', переход к '+W40+' при 3 дне подтверждения';
    }else{                                               // разгрузка держится растяжением
      label='опасное отклонение от SMA200';
      ind=[`отклонение от SMA200 <b>${pc1(D)}</b> ≥ 20% — разгрузка`,`возврат при D &lt; 12% (3 закрытия)`];
      act=W20;
    }
  }else if(m.state==='RISKON'){
    dist=W60;dot=DOT.acc;col=COL.acc;
    if(m.co>0){                                          // тренд замедляется → слабый
      label='тренд замедляется → слабый';
      ind=[`наклон EMA20 <b>${pc2(sl)}</b> · выход &lt;+0,4% ✓`,`подтверждение выхода: <b>${m.co}</b> из 3`];
      act=W60+', переход к '+W40+' при 3 дне подтверждения';
    }else{                                               // тренд устойчиво сильный
      label='тренд устойчиво сильный';
      ind=[`наклон EMA20 <b>${pc2(sl)}</b> · держится · выход &lt;+0,4%`,`отклонение от SMA200 <b>${pc1(D)}</b> · лимит 20%`,`жёлтая зона: нет`];
      act=W60;
    }
  }else{                                                 // BASE 40/60
    dist=W40;
    if(m.overext&&!isNaN(m.slope)&&m.slope>MOD.ENTER){   // вход в разгон заблокирован растяжением (D в 18–20%)
      label='опасное отклонение от SMA200 · вход заблокирован';dot=DOT.warn;col=COL.warn;
      ind=[`наклон EMA20 <b>${pc2(sl)}</b> · вход &gt;+0,9% ✓`,`отклонение от SMA200 <b>${pc1(D)}</b> — вход в разгон запрещён`,`снятие блока при D &lt; 18%`];
      act=W40;
    }else if(m.pending==='RISKON'&&m.ci>0){              // тренд ускоряется → сильный
      label='тренд ускоряется → сильный';dot=DOT.acc;col=COL.acc;
      ind=[`наклон EMA20 <b>${pc2(sl)}</b> · вход &gt;+0,9% ✓`,`подтверждение входа: <b>${m.ci}</b> из 5`,`отклонение от SMA200 <b>${pc1(D)}</b> · лимит 20%`];
      act=W40+', переход к '+W60+' при 5 дне подтверждения';
    }else{                                               // тренд устойчиво слабый
      label='тренд устойчиво слабый';dot=DOT.base;col=COL.base;
      ind=[`наклон EMA20 <b>${pc2(sl)}</b> · вход &gt;+0,9% — нет`,`отклонение от SMA200 <b>${pc1(D)}</b> · лимит 20%`,`жёлтая зона: нет`];
      act=W40;
    }
  }
  if(rebal)act='ребаланс → '+dist;                       // на баре смены веса — прямое указание
  return{label,dot,col,dist,ind,act};
}

/* сборка карточки состояния */
function scard(v){
  return `<div class="scard">`+
    `<div class="st"><span class="dot" style="background:${v.dot}"></span>`+
    `<span class="lb">${v.col?`<span style="color:${v.col}">${v.label}</span>`:v.label}${v.dist?` · ${v.dist}`:''}</span></div>`+
    `<div class="ind">${v.ind.map(x=>`<div>${x}</div>`).join('')}</div>`+
    (v.act?`<div class="act"><b>Действие:</b> ${v.act}</div>`:'')+
    `</div>`;
}

/* ---- МАШИНА ЯДРА ----
   Страница только сигналит — исполнение и журнал сделок остаются за пользователем.
   Пороги от ATH: EXIT −11,2% (выход/выключение модуля), T1 −20,6%, T2 −29,5%,
   T3 −41,5% (лестница TQQQ); BEAR −20,0% (полный выход QDTE).

   ТАЙМФРЕЙМ (I-4): сигналы выхода и возврата проверяются ТОЛЬКО на закрытии недели.
   Внутри недели фаза не меняется. Транши — исключение: лимитки исполняются по
   внутридневному касанию в любой день.
   ЛЕСТНИЦА НАКОПИТЕЛЬНА (I-6): транши — заявки на ФИКСИРОВАННЫХ ценах, выставленных
   в момент выхода. Один раз за цикл; отскоком не отменяются. Сброс — при новом ATH.
   РЕФЕРЕНС ВОЗВРАТА (I-7): цена уровня выхода (−11,2%), либо цена самого глубокого
   ИСПОЛНЕННОГО транша — зафиксированное число, не пересчёт от текущего ATH.
   I-8: ложные циклы (выход → возврат выше цены выхода без траншей). Два подряд — флаг. */
const CORE={EXIT:-0.112,T1:-0.206,T2:-0.295,T3:-0.415,BEAR:-0.20};
const RUNG=[['T1',-0.206],['T2',-0.295],['T3',-0.415]];

function runCoreTQQQ(rows,weekEnd){
  let out=false;               // в кризисе (вышли)
  let exitPx=null;             // цена уровня выхода (фикс.)
  let rungPx=[0,0,0];          // фикс. цены лимиток траншей
  let fired=[false,false,false];
  let ref=null;                // референс возврата (фикс. цена)
  let ath=-Infinity;
  let falseRow=0, flagI8=false;
  let justExited=false;

  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    const prevAth=ath;
    ath=Math.max(ath,r.c);
    justExited=false;

    if(out){
      // транши: внутридневное касание, одноразово, в любой день (I-6)
      for(let j=0;j<3;j++){
        if(!fired[j] && r.l<=rungPx[j]){ fired[j]=true; ref=rungPx[j]; }
      }
    }else if(ath>prevAth && prevAth>-Infinity){
      // новый ATH вне кризиса — цикл лестницы закрыт, флаги сброшены (I-6)
      fired=[false,false,false]; falseRow=0;
    }

    if(weekEnd[i]){                       // ТОЛЬКО закрытие недели (I-4)
      const dd=r.c/ath-1;
      if(!out){
        if(dd<=CORE.EXIT){
          out=true;
          exitPx=ath*(1+CORE.EXIT);
          rungPx=RUNG.map(([,th])=>ath*(1+th));
          fired=[false,false,false];
          ref=exitPx;                     // траншей ещё нет → референс = цена выхода
          justExited=true;
        }
      }else if(r.c>ref && r.adx>25 && r.chop<45){
        // I-8: ложный цикл = вернулись выше цены самого выхода, транши не срабатывали
        if(!fired[0] && !fired[1] && !fired[2] && r.c>exitPx) falseRow++;
        else falseRow=0;
        if(falseRow>=2) flagI8=true;
        out=false; exitPx=null; ref=null; fired=[false,false,false];
      }
    }
  }
  let depth='EXIT';
  for(let j=0;j<3;j++) if(fired[j]) depth=RUNG[j][0];
  return{out,depth,fired,ref,exitPx,rungPx,flagI8,falseRow,justExited,ath,
         phase: out?depth:null};
}

function runCoreQDTE(rows,weekEnd){
  let phase='FULL', ath=-Infinity, halfRef=null, outRef=null;
  let retReady=false;                     // условие возврата выполнено на посл. недельном закрытии
  for(let i=0;i<rows.length;i++){
    const r=rows[i]; ath=Math.max(ath,r.c);
    if(!weekEnd[i]) continue;             // ТОЛЬКО закрытие недели (II-2, II-3)
    const dd=r.c/ath-1;
    retReady=false;
    if(phase==='FULL'){
      if(dd<=CORE.BEAR){phase='OUT'; outRef=ath*(1+CORE.BEAR); halfRef=ath*(1+CORE.EXIT);}
      else if(dd<=CORE.EXIT){phase='HALF'; halfRef=ath*(1+CORE.EXIT); outRef=ath*(1+CORE.BEAR);}
    }else if(phase==='HALF'){
      if(dd<=CORE.BEAR){phase='OUT'; if(outRef===null)outRef=ath*(1+CORE.BEAR);}
      else if(halfRef!==null && r.c>halfRef && r.adx>25 && r.chop<45){phase='FULL'; halfRef=outRef=null; retReady=true;}
    }else{
      if(outRef!==null && r.c>outRef && r.adx>25 && r.chop<45){phase='HALF'; retReady=true;}
    }
  }
  /* halfRef/outRef — ЗАФИКСИРОВАННЫЕ цены уровней возврата (от ATH на момент выхода);
     карточка обязана сверяться с ними, а не пересчитывать от текущего ATH */
  return{phase,halfRef,outRef,retReady,ath};
}

/* ---- прогон ---- */
async function runAdvisor(){
  $('warnbar').style.display='none';
  $('meta').textContent='загрузка данных…';
  try{
    const q=await getData('QQQ','1999-01-01');
    let qqqLive=null;try{qqqLive=await getLive('QQQ');}catch(e){log('QQQ live: '+e.message);}
    let tqCur=null,tqAth=null;
    try{const t=await getData('TQQQ','2010-02-01');tqAth=Math.max(...t.map(r=>r.c));
      let tl=null;try{tl=await getLive('TQQQ');}catch(e){log('TQQQ live: '+e.message);}
      tqCur=(tl!=null?tl:t[t.length-1].c);}
    catch(e){log('TQQQ: '+e.message);}
    let qdCur=null,qdDivs=null;
    try{const qd=await getData('QDTE','2024-03-01');
      let ql=null;try{ql=await getLive('QDTE');}catch(e){log('QDTE live: '+e.message);}
      qdCur=(ql!=null?ql:qd[qd.length-1].c);
      qdDivs=qd.filter(r=>r.div>0).map(r=>({d:r.d,a:r.div}));}
    catch(e){log('QDTE: '+e.message);}

    const last=q[q.length-1],ath=Math.max(...q.map(r=>r.c));
    const live=(qqqLive!=null);
    const cur=(live?qqqLive:last.c);
    const ddFrac=cur/ath-1, dd=100*ddFrac;
    const {adxArr,chopArr,adx,chop}=taSeries(q);

    /* индикаторы модуля по дневным закрытиям QQQ */
    const closes=q.map(r=>r.c);
    const ema20=ewm(closes,2/21);          // span 20 → alpha 2/21 (как ewm(span=20) в бэктесте)
    const sma200=smaArr(closes,200);
    const athArr=cummax(closes);
    const mod=runModule(closes,ema20,sma200);

    /* недельный сигнал */
    const wk=weeklyCloses(q);
    const nowKey=isoWeekKey(new Date()),lastBarKey=wk[wk.length-1].key;
    const curW=cur;
    const prevW=(lastBarKey===nowKey?wk[wk.length-2].c:wk[wk.length-1].c);
    const lastDate=new Date(last.d+'T12:00:00Z'),dow=lastDate.getUTCDay();
    const fri=new Date(lastDate);fri.setUTCDate(lastDate.getUTCDate()+((5-dow+7)%7));fri.setUTCHours(22,0,0,0);
    const weekDone=dow===5||Date.now()>fri.getTime();
    const stale=Math.round((Date.now()-lastDate.getTime())/864e5);
    $('meta').textContent=`бар ${last.d}`+(stale>4?` · устарело ${stale} дн.`:'')+(weekDone?' · неделя закрыта':' · неделя не закрыта')+(live?' · цена LIVE':' · цена: закрытие');

    /* машина ядра. Фаза меняется ТОЛЬКО на закрытии недели (I-4). Живая цена
       добавляется отдельным баром, лишь если текущая неделя УЖЕ закрыта (пятница
       позади) — иначе внутринедельное движение фазу не двигает; для него ниже
       считается предварительное предупреждение. */
    const coreRows=q.map((r,i)=>({c:r.c,l:r.l,adx:adxArr[i],chop:chopArr[i]}));
    const weekEnd=new Array(q.length).fill(false);
    for(const w of wk) weekEnd[w.i]=true;
    /* Последний бар помечаем концом недели только если неделя реально закрыта.
       Если торговая неделя ещё идёт — сигналов выхода/возврата нет (I-4),
       но транши по касанию продолжают действовать (они дневные). */
    if(!weekDone) weekEnd[q.length-1]=false;
    /* живая цена: обновляет только внутридневной Low ТЕКУЩЕГО бара (для лимиток),
       закрытие последнего бара не подменяем, пока неделя не закрыта */
    if(live){
      const li=coreRows.length-1;
      coreRows[li]={...coreRows[li], l:Math.min(coreRows[li].l,curW), c:(weekDone?curW:coreRows[li].c)};
    }
    const tqCore=runCoreTQQQ(coreRows,weekEnd);
    const qdCore=runCoreQDTE(coreRows,weekEnd);
    const standard=(tqCore.phase===null);

    /* предварительное предупреждение: неделя ещё идёт, но текущая цена уже ниже
       уровня — если неделя закроется так, сработает выход. Фазу не меняем. */
    const preExit=(!weekDone)&&standard&&(curW<=tqCore.ath*(1+CORE.EXIT));

    const L={};for(const k in MULT)L[k]=ath*MULT[k];
    const tqAt=k=>tqCur?tqCur*Math.pow(L[k]/cur,3):null;

    /* мастер-статус (цвет от просадки QQQ) */
    let stName,stCls;
    if(dd>DD.yellow){stName='норма';stCls='b-ok';}
    else if(dd>DD.exit){stName='жёлтый';stCls='b-warn';}
    else if(dd>DD.bear){stName='красный';stCls='b-red';}
    else{stName='медвежий';stCls='b-bear';}

    /* шапка */
    $('hdr').innerHTML=`QQQ <b>${fmt(cur)}</b>${live?' <span class="live">LIVE</span>':''} · ATH <b>${fmt(ath)}</b> · просадка <b>${pc1(dd)}</b>`;
    $('hdr-badge').innerHTML=`<span class="badge ${stCls}"><span class="dot"></span>${stName}</span>`;

    /* плашка режима (информационная — фаза определяется автоматически) */
    $('regime').innerHTML=standard
      ? `<div class="regime"><div class="t">Стандартный режим · управляет модуль</div><div class="s">растяжение — ${W20} · база — ${W40} · тренд — ${W60}</div></div>`
      : `<div class="regime crisis"><div class="t">Кризис · управляет ядро</div><div class="s">модуль выключен · лестница и ступенчатый выход</div></div>`;

    /* ================= TQQQ ================= */
    $('tq-nums').innerHTML=`QQQ <b>${fmt(cur)}</b>`+(tqCur?` · TQQQ <b>${fmt(tqCur)}</b>`:'');
    const priceCell=(k,q)=>{const tq=tqAt(k);return tq!=null?`${f1(tq)} <span class="paren">(${fmt(q)})</span>`:`${fmt(q)}`;};
    const priceRaw=(tqv,qv)=>tqv!=null?`${f1(tqv)} <span class="paren">(${fmt(qv)})</span>`:`${fmt(qv)}`;

    if(standard){
      /* уровни: ATH, текущий, жёлтый, выход */
      const tqAthP=tqCur?tqCur*Math.pow(ath/cur,3):null;
      $('tq-left').innerHTML=`<div class="lvls">`+
        `<div class="h"><span></span><span>${tqCur?'TQQQ (QQQ)':'QQQ'}</span></div>`+
        `<div class="l"><span class="c-m">ATH</span><span>${priceRaw(tqAthP,ath)}</span></div>`+
        `<div class="l"><span class="c-cur">сейчас ${pc1(dd)}</span><span>${priceRaw(tqCur,cur)}</span></div>`+
        `<div class="l"><span class="c-y">−5,3% жёлтый</span><span>${priceCell('yellow',L.yellow)}</span></div>`+
        `<div class="l"><span class="c-r">−11,2% выкл</span><span>${priceCell('exit',L.exit)}</span></div>`+
        `</div>`;
      /* карточка модуля (пробой −11,2% теперь выводит в crisis-ветку автоматически) */
      /* preExit: цена внутри недели уже ниже −11,2%, но неделя не закрыта — фаза
         НЕ меняется (I-4), показываем предупреждение поверх карточки модуля */
      if(preExit){
        $('tq-right').innerHTML=scard({label:'Предварительно: выход',dot:'var(--warn-dot)',col:'var(--warn)',dist:'',
          ind:[`цена <b>${fmt(curW)}</b> ниже уровня −11,2% (<b>${fmt(tqCore.ath*(1+CORE.EXIT))}</b>)`,
               `неделя не закрыта — сигнала ещё нет`,
               `если неделя закроется так, в понедельник выход: продать 100% TQQQ → SGOV`],
          act:'ждать закрытия недели · сделок пока нет'});
      }else{
        $('tq-right').innerHTML=scard(moduleView(mod,ddFrac));
      }
      $('tq-hint').style.display='';
      $('tq-hint').textContent='Наклон EMA20 и SMA200 считаются по дневному закрытию QQQ. Сигналы выхода и возврата — только по закрытию недели (I-4); транши — по касанию в любой день.';
    }else{
      /* кризис: лестница ядра. Цены лимиток ЗАФИКСИРОВАНЫ в момент выхода (I-6),
         сработавшие транши помечены — они одноразовы и отскоком не отменяются. */
      const RG=[['t1','−20,6% транш 1',0],['t2','−29,5% транш 2',1],['t3','−41,5% транш 3',2]];
      const tqAtPx=px=>tqCur?tqCur*Math.pow(px/cur,3):null;
      let rows=`<div class="h"><span></span><span>${tqCur?'TQQQ (QQQ)':'QQQ'}</span></div>`+
        `<div class="l"><span class="c-cur">сейчас ${pc1(dd)}</span><span>${priceRaw(tqCur,cur)}</span></div>`+
        `<div class="l"><span class="c-r">−11,2% выход</span><span>${priceRaw(tqAtPx(tqCore.exitPx),tqCore.exitPx)}</span></div>`;
      for(const [k,lbl,j] of RG){
        const px=tqCore.rungPx[j], done=tqCore.fired[j];
        rows+=`<div class="l"><span class="${done?'c-ok':'c-m'}">${done?'✓ ':''}${lbl}</span>`+
              `<span class="${done?'c-ok':''}">${priceRaw(tqAtPx(px),px)}</span></div>`;
      }
      $('tq-left').innerHTML=`<div class="lvls">${rows}</div>`;

      const nFired=tqCore.fired.filter(Boolean).length;
      const invested=[0,10,35,100][nFired];              // накоплено в позиции, % боезапаса
      const posTxt=nFired===3?'в позиции 100%, лестница отработана'
                 :nFired===0?'в SGOV 100%'
                 :`в позиции ${invested}%, в SGOV ${100-invested}%`;
      const nxtIdx=tqCore.fired.findIndex(f=>!f);
      const nxtName=nxtIdx>=0?['транш 1','транш 2','транш 3'][nxtIdx]:null;
      const nxtPx=nxtIdx>=0?tqCore.rungPx[nxtIdx]:null;
      const okRe=curW>tqCore.ref&&adx>25&&chop<45;       // референс — ЗАФИКСИРОВАННАЯ цена (I-7)
      const refTxt=`${fmt(tqCore.ref)}`+(nFired?` (транш ${nFired})`:' (уровень выхода)');
      let label,ind;
      if(tqCore.justExited){label='Красный · выход';
        ind=[`пересечён −11,2% (недельное закрытие)`,
             `продать 100% TQQQ → SGOV, выставить лестницу 10 / 25 / 65`,
             `транш 1 — лимитка на уровне QQQ ${fmt(tqCore.rungPx[0])}`];
      }else if(okRe){label='Красный · возврат';
        ind=[`закрытие выше референса ${refTxt}`,`вернуть остаток в позицию`+(weekDone?'':' (неделя не закрыта)'),
             `ADX ${adx.toFixed(1)} &gt; 25 · CHOP ${chop.toFixed(1)} &lt; 45 — фильтр пройден`];
      }else{label='Красный · в кэше';
        const nx=nxtPx!=null?tqAtPx(nxtPx):null;
        const foreL=nxtName?`${nxtName} — лимитка на ${nx!=null?f1(nx)+' (QQQ '+fmt(nxtPx)+')':'QQQ '+fmt(nxtPx)}`
                           :'лестница отработана — ждём возврата остатка';
        ind=[posTxt,foreL,
             `возврат: закрытие выше ${refTxt} + ADX&gt;25 + CHOP&lt;45 · сейчас ADX ${adx.toFixed(1)}, CHOP ${chop.toFixed(1)}`];
      }
      $('tq-right').innerHTML=scard({label,dot:'var(--red-dot)',col:'var(--red)',dist:'',ind,act:''});
      $('tq-hint').style.display='none';
    }

    /* ================= QDTE ================= */
    $('qd-nums').innerHTML=(qdCur?`QDTE <b>${fmt(qdCur)}</b> <span class="ref">(справочно)</span> · `:'')+`ADX ${adx.toFixed(1)} · CHOP ${chop.toFixed(1)}`;
    $('qd-left').innerHTML=`<div class="lvls">`+
      `<div class="h q"><span></span><span>QQQ</span><span>действие</span></div>`+
      `<div class="l q"><span class="c-ok">норма</span><span class="c-ok">&gt;${fmt(L.yellow)}</span><span class="c-ok">реинвест</span></div>`+
      `<div class="l q"><span class="c-y">−5,3% жёлтый</span><span class="c-y">${fmt(L.yellow)}</span><span class="c-y">в SGOV</span></div>`+
      `<div class="l q"><span class="c-r">−11,2% красный</span><span class="c-r">${fmt(L.exit)}</span><span class="c-r">выход 50%</span></div>`+
      `<div class="l q"><span class="c-b">−20,0% медв.</span><span class="c-b">${fmt(L.bear)}</span><span class="c-b">выход 100%</span></div>`+
      `</div>`;

    if(standard){
      /* держим 100%, различие только в судьбе выплат (норма/жёлтый) */
      let ind,act;
      if(dd>DD.yellow){
        ind=[`просадка QQQ <b>${pc1(dd)}</b> · норма`,`красный −11,2%: не достигнут`,`медвежий −20,0%: не достигнут`];
        act='держать 100%, выплаты реинвестировать';
      }else{
        ind=[`просадка QQQ <b>${pc1(dd)}</b> ≤ −5,3% · жёлтый`,`красный −11,2%: не достигнут`];
        act='держать 100%, выплаты — в SGOV';
      }
      $('qd-right').innerHTML=scard({label:'Держать 100%',dot:'var(--ok-dot)',col:'var(--ok)',dist:'',ind,act});
    }else{
      /* кризис: фаза QDTE — ТОЛЬКО из машины (меняется по недельному закрытию, II-2/II-3).
         Референсы возврата — зафиксированные цены из машины, не пересчёт от текущего ATH.
         Внутринедельное движение глубже следующего порога — предварительное предупреждение. */
      const qs=qdCore.phase;let label,dot,col,ind,act;
      const preBear=(!weekDone)&&(qs!=='OUT')&&(curW<=qdCore.ath*(1+CORE.BEAR));
      if(qs==='FULL'){
        /* сюда попадаем в TQQQ-кризисе до того, как QDTE-машина увидела недельное
           закрытие ниже −11,2% (например TQQQ вышел, QDTE ещё держит 100%) */
        label='Держать 100%';dot='var(--ok-dot)';col='var(--ok)';
        ind=[`фаза QDTE меняется по недельному закрытию`,
             preBear?`предварительно: цена ниже −20% — если неделя закроется так, выход 100%`
                    :`при недельном закрытии ≤ −11,2% — выход 50%`];
        act='держать 100%, выплаты — в SGOV';
      }else if(qs==='HALF'){
        const okBack=qdCore.halfRef!==null&&curW>qdCore.halfRef&&adx>25&&chop<45;
        label='Красный · выход 50%';dot='var(--red-dot)';col='var(--red)';
        if(preBear){
          ind=[`в SGOV 50%`,`предварительно: цена ниже −20% — если неделя закроется так, выход 100%`];
          act='держать 50% в SGOV · ждать закрытия недели';
        }else if(okBack){
          ind=[`закрытие выше уровня возврата ${fmt(qdCore.halfRef)}`,
               `ADX ${adx.toFixed(1)} &gt; 25 · CHOP ${chop.toFixed(1)} &lt; 45 — фильтр пройден`+(weekDone?'':' (неделя не закрыта)')];
          act='вернуть остаток в QDTE';
        }else{
          ind=[`в SGOV 50%, ждём возврат остатка`,
               `возврат: закрытие выше ${qdCore.halfRef?fmt(qdCore.halfRef):'—'} + ADX&gt;25 + CHOP&lt;45 · сейчас ADX ${adx.toFixed(1)}, CHOP ${chop.toFixed(1)}`];
          act='держать 50% в SGOV';
        }
      }else{ // OUT
        const okBack1=qdCore.outRef!==null&&curW>qdCore.outRef&&adx>25&&chop<45;
        label='Медвежий · выход 100%';dot='var(--bear-dot)';col='var(--bear)';
        if(okBack1){
          ind=[`закрытие выше уровня первого транша ${fmt(qdCore.outRef)}`,
               `ADX ${adx.toFixed(1)} &gt; 25 · CHOP ${chop.toFixed(1)} &lt; 45 — фильтр пройден`+(weekDone?'':' (неделя не закрыта)')];
          act='вернуть 50% в QDTE';
        }else{
          ind=[`в SGOV 100%, ждём первый транш возврата`,
               `возврат: закрытие выше ${qdCore.outRef?fmt(qdCore.outRef):'—'} + ADX&gt;25 + CHOP&lt;45 · сейчас ADX ${adx.toFixed(1)}, CHOP ${chop.toFixed(1)}`];
          act='держать 100% в SGOV';
        }
      }
      $('qd-right').innerHTML=scard({label,dot,col,dist:'',ind,act});
    }

    /* здоровье выплат */
    let hHtml;
    if(qdDivs&&qdDivs.length>=1){
      const lastD=qdDivs[qdDivs.length-1].a;
      const prev=qdDivs.slice(Math.max(0,qdDivs.length-4),qdDivs.length-1);
      const avg=prev.length?prev.reduce((s,x)=>s+x.a,0)/prev.length:lastD;
      const delta=100*(lastD/avg-1);
      let cls,lab;
      if(prev.length<2){cls='bs-warn';lab='мало данных';}
      else if(delta<=-25){cls='bs-red';lab='падение';}
      else if(delta>=10){cls='bs-ok';lab='рост';}
      else{cls='bs-ok';lab='норма';}
      hHtml=`<div class="health-head"><span class="t">Здоровье фонда · тренд выплат</span><span class="badge ${cls}"><span class="dot"></span>${lab}</span></div>`+
        `<div class="health-cells">`+
        `<div class="hc"><div class="n">$${lastD.toFixed(4)}</div><div class="c">последняя</div></div>`+
        `<div class="hc"><div class="n">$${avg.toFixed(4)}</div><div class="c">средняя (${prev.length||1})</div></div>`+
        `<div class="hc"><div class="n" style="color:${delta<=-25?'var(--red)':'var(--ok)'}">${delta>=0?'+':''}${delta.toFixed(1)}%</div><div class="c">отклонение</div></div>`+
        `</div><div style="font-size:.8rem;color:var(--muted);margin-top:11px">Тревога при падении &gt;25% к средней и снижающейся цене пая. Порог −25% — инженерная оценка.</div>`;
    }else{
      hHtml=`<div class="health-head"><span class="t">Здоровье фонда · тренд выплат</span><span class="badge bs-warn"><span class="dot"></span>нет данных</span></div>`+
        `<div style="font-size:.9rem;color:var(--sec)">История выплат QDTE недоступна. Вносите выплаты в журнал вручную.</div>`;
    }
    $('qd-health').innerHTML=hHtml;

    /* I-8: два ложных цикла подряд — третий выход НЕ автоматический, решение на человеке */
    if(tqCore.flagI8){
      $('warnbar').style.display='';
      $('warnbar').innerHTML='<b>I-8: выход дважды подряд оказался ложным</b> — рынок пилит у −11,2%. '+
        'Третий выход система автоматически не принимает: решите сами — пила (держать позицию, приостановить выходы) '+
        'или начало разворота вниз (выход валиден). Транши при любом решении продолжают действовать.';
    }else if(Math.abs(dd)<=0.1){$('warnbar').style.display='';$('warnbar').textContent='QQQ на новом максимуме: пересчитать уровни, переставить алерты.';}
    $('out').style.display='';
  }catch(e){log('ОШИБКА: '+e.message);$('warnbar').style.display='';$('warnbar').textContent='Ошибка: '+e.message;$('meta').textContent='ошибка загрузки';}
}

/* автозапуск при открытии; обновление — перезагрузкой (F5) */
runAdvisor().then(()=>{window.__loaded=true;});
</script>
<script>
document.getElementById('yr').textContent=new Date().getFullYear();
(function(){
  var out=document.getElementById('out'),wb=document.getElementById('warnbar'),
      ld=document.getElementById('loader'),ft=document.getElementById('foot');
  function upd(){
    if(out.style.display!=='none'){ld.style.display='none';ft.style.display='';}
    else if(wb.style.display!=='none'&&wb.style.display!==''){ld.style.display='none';}
  }
  new MutationObserver(upd).observe(out,{attributes:true,attributeFilter:['style']});
  new MutationObserver(upd).observe(wb,{attributes:true,attributeFilter:['style']});
  upd();
})();
</script>
</body>
</html>
