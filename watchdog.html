// ---------- Вспомогательные ----------
const uid = () => Math.random().toString(36).slice(2, 9);
const KEY = "watchdog-board-v1";

// ---------- Адаптер хранилища ----------
// В среде Claude-артефактов существует window.storage (персистентное key-value API).
// На обычном сайте его нет — используем localStorage.
// Чтобы перейти на бэкенд, достаточно заменить эти три метода на вызовы вашего API.
const isClaudeArtifact = () =>
  typeof window !== "undefined" && !!(window.storage && window.storage.get);

const storage = {
  async get(key) {
    if (isClaudeArtifact()) {
      try { return await window.storage.get(key); } catch { return null; }
    }
    const v = window.localStorage.getItem(key);
    return v === null ? null : { key, value: v };
  },
  async set(key, value) {
    if (isClaudeArtifact()) return window.storage.set(key, value);
    window.localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    if (isClaudeArtifact()) {
      try { return await window.storage.delete(key); } catch { return null; }
    }
    window.localStorage.removeItem(key);
    return { key, deleted: true };
  },
};

function verdict(evidence) {
  const pro = evidence.filter((e) => e.dir === "pro").reduce((s, e) => s + e.w, 0);
  const con = evidence.filter((e) => e.dir === "contra").reduce((s, e) => s + e.w, 0);
  const total = pro + con;
  const ratio = total ? pro / total : 0.5;
  let label = "Спорно";
  if (ratio >= 0.7) label = "Подтверждается";
  else if (ratio <= 0.3) label = "Опровергается";
  return { pro, con, ratio, label };
}

// ---------- Компоненты ----------
function Balance({ ratio, pro, con }) {

    <div>
      <div style={{ display: "flex", height: 8, borderRadius: 4, overflow: "hidden", background: C.line }}>

      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: mono, fontSize: 13, color: C.inkSoft, marginTop: 4 }}>
        <span style={{ color: C.pro }}>за {pro}</span>
        <span style={{ color: C.contra }}>против {con}</span>
      </div>
    </div>
  );
}

function ConfirmX({ onConfirm, title }) {
  const [arming, setArming] = useState(false);
  useEffect(() => {
    if (!arming) return;
    const t = setTimeout(() => setArming(false), 3000);
    return () => clearTimeout(t);
  }, [arming]);
  if (arming) {
    return (
      <button onClick={onConfirm} title="Нажмите ещё раз для удаления"
        style={{
          border: `1px solid ${C.contra}`, borderRadius: 4, background: C.contraBg,
          color: C.contra, cursor: "pointer", fontFamily: mono, fontSize: 12,
          fontWeight: 700, padding: "3px 8px", whiteSpace: "nowrap",
        }}>удалить?</button>
    );
  }
  return (
    <button onClick={() => setArming(true)} title={title}
      style={{ border: "none", background: "none", color: C.inkSoft, cursor: "pointer", fontSize: 17, padding: 2 }}>×</button>
  );
}

function EvidenceRow({ ev, onDelete }) {

        fontFamily: mono, fontSize: 12, fontWeight: 700, padding: "2px 6px", borderRadius: 3,
        background: pro ? C.proBg : C.contraBg, color: pro ? C.pro : C.contra, whiteSpace: "nowrap", marginTop: 1,

        {pro ? "ЗА" : "ПРОТИВ"} ×{ev.w}
      </div>
      <div style={{ fontSize: 16, lineHeight: 1.45, color: C.ink, flex: 1 }}>{ev.text}</div>
      <ConfirmX onConfirm={onDelete} title="Удалить свидетельство" />
    </div>
  );
}

function AddEvidence({ onAdd }) {
  const [text, setText] = useState("");
  const [dir, setDir] = useState("pro");
  const [w, setW] = useState(2);
  const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
  const submit = () => {
    if (!text.trim()) return;
    onAdd({ id: uid(), date, dir, w: Number(w), text: text.trim() });
    setText("");
  };
  const inp = { border: `1px solid ${C.line}`, borderRadius: 6, padding: "6px 8px", fontSize: 15, fontFamily: sans, background: "#FAFBFB", color: C.ink };
  return (
    <div style={{ borderTop: `1px dashed ${C.line}`, paddingTop: 10, marginTop: 4, display: "flex", flexDirection: "column", gap: 8 }}>
      <textarea value={text} onChange={(e) => setText(e.target.value)} rows={2}
        placeholder="Новое свидетельство: факт + дата + почему он важен"
        style={{ ...inp, resize: "vertical", width: "100%", boxSizing: "border-box" }} />
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
        <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={inp} />
        <select value={dir} onChange={(e) => setDir(e.target.value)} style={inp}>
          <option value="pro">За тезис</option>
          <option value="contra">Против тезиса</option>
        </select>
        <select value={w} onChange={(e) => setW(e.target.value)} style={inp} title="Вес свидетельства">
          <option value={1}>вес 1 — слабый сигнал</option>
          <option value={2}>вес 2 — заметный</option>
          <option value={3}>вес 3 — сильный</option>
        </select>
        <button onClick={submit} style={{
          border: "none", borderRadius: 6, padding: "7px 14px", background: C.accent, color: "#fff",
          fontSize: 15, fontWeight: 600, cursor: "pointer",
        }}>Добавить</button>
      </div>
    </div>
  );
}

function ThesisCard({ thesis, onChange, onDelete }) {
  const [open, setOpen] = useState(false);
  const v = useMemo(() => verdict(thesis.evidence), [thesis.evidence]);
  const badgeColor = v.label === "Подтверждается" ? C.pro : v.label === "Опровергается" ? C.contra : C.amber;
  const sorted = [...thesis.evidence].sort((a, b) => (a.date < b.date ? 1 : -1));
  return (
    <div style={{ background: C.card, border: `1px solid ${C.line}`, borderRadius: 10, padding: "16px 18px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "flex-start" }}>
        <div style={{ flex: 1 }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 6 }}>
            <span style={{
              fontFamily: mono, fontSize: 12, fontWeight: 700, letterSpacing: 0.5,
              color: badgeColor, border: `1px solid ${badgeColor}`, borderRadius: 3, padding: "2px 6px",
            }}>{v.label.toUpperCase()}</span>
            <span style={{ fontFamily: mono, fontSize: 13, color: C.inkSoft }}>{thesis.evidence.length} свидетельств</span>
          </div>
          <div style={{ fontSize: 19, fontWeight: 700, color: C.ink, lineHeight: 1.3 }}>{thesis.title}</div>
          <div style={{ fontSize: 16, color: C.inkSoft, marginTop: 5, lineHeight: 1.45 }}>{thesis.statement}</div>
        </div>
        <ConfirmX onConfirm={onDelete} title="Удалить тезис" />
      </div>
      <div style={{ marginTop: 12 }}>
        <Balance ratio={v.ratio} pro={v.pro} con={v.con} />
      </div>
      <button onClick={() => setOpen(!open)} style={{
        marginTop: 10, border: "none", background: "none", color: C.accent, cursor: "pointer",
        fontFamily: mono, fontSize: 14, padding: 0,
      }}>{open ? "▲ свернуть свидетельства" : "▼ развернуть свидетельства"}</button>
      {open && (
        <div style={{ marginTop: 6 }}>
          {sorted.map((ev) => (
            <EvidenceRow key={ev.id} ev={ev}
              onDelete={() => onChange({ ...thesis, evidence: thesis.evidence.filter((e) => e.id !== ev.id) })} />
          ))}
          <AddEvidence onAdd={(ev) => onChange({ ...thesis, evidence: [...thesis.evidence, ev] })} />
        </div>
      )}
    </div>
  );
}

function ImportPanel({ onImport, onClose }) {
  const [raw, setRaw] = useState("");
  const [msg, setMsg] = useState(null);
  const run = () => {
    try {
      let text = raw.trim();
      const m = text.match(/\{[\s\S]*\}/);
      if (m) text = m[0];
      const data = JSON.parse(text);
      if (!data.theses || !Array.isArray(data.theses)) throw new Error();
      const result = onImport(data.theses);
      setMsg({ ok: true, text: `Готово: тезисов добавлено ${result.newTheses}, свидетельств внесено ${result.newEvidence}, дубликатов пропущено ${result.skipped}.` });
      setRaw("");
    } catch {
      setMsg({ ok: false, text: "Не удалось разобрать JSON. Вставьте блок целиком, как его выдал Claude." });
    }
  };
  return (
    <div style={{ background: C.card, border: `1px solid ${C.accent}`, borderRadius: 10, padding: "14px 18px", marginBottom: 14, display: "flex", flexDirection: "column", gap: 8 }}>
      <div style={{ display: "flex", alignItems: "center" }}>
        <span style={{ fontFamily: mono, fontSize: 13, fontWeight: 700, color: C.accent, letterSpacing: 0.5 }}>ИМПОРТ ИЗ ЧАТА</span>
        <button onClick={onClose} style={{ marginLeft: "auto", border: "none", background: "none", color: C.inkSoft, cursor: "pointer", fontSize: 17 }}>×</button>
      </div>
      <p style={{ fontSize: 14.5, color: C.inkSoft, margin: 0, lineHeight: 1.5 }}>
        Вставьте JSON-блок из ответа Claude. Новые тезисы будут созданы, свидетельства добавятся к существующим
        тезисам по совпадению названия, точные дубликаты пропускаются.
      </p>
      <textarea value={raw} onChange={(e) => setRaw(e.target.value)} rows={5}
        placeholder='{"theses":[{"title":"…","evidence":[{"date":"2026-07-03","dir":"pro","w":2,"text":"…"}]}]}'
        style={{ border: `1px solid ${C.line}`, borderRadius: 6, padding: "8px 10px", fontSize: 14, fontFamily: mono, background: "#FAFBFB", color: C.ink, resize: "vertical", width: "100%", boxSizing: "border-box" }} />
      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <button onClick={run} style={{ border: "none", borderRadius: 6, padding: "7px 16px", background: C.accent, color: "#fff", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
          Внести на доску
        </button>
        {msg && <span style={{ fontSize: 14.5, color: msg.ok ? C.pro : C.contra }}>{msg.text}</span>}
      </div>
    </div>
  );
}

// ---------- Приложение ----------
function WatchdogPage() {
  const [board, setBoard] = useState(null);
  const [status, setStatus] = useState("загрузка…");

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get(KEY);
        setBoard(res ? JSON.parse(res.value) : SEED);
        setStatus(res ? "сохранено" : "стартовые данные");
      } catch {
        setBoard(SEED);
        setStatus("стартовые данные");
      }
    })();
  }, []);

  const save = async (next) => {
    setBoard(next);
    try {
      await storage.set(KEY, JSON.stringify({ ...next, updatedAt: new Date().toISOString().slice(0, 10) }));
      setStatus("сохранено");
    } catch {
      setStatus("не удалось сохранить");
    }
  };

  const [resetArming, setResetArming] = useState(false);
  useEffect(() => {
    if (!resetArming) return;
    const t = setTimeout(() => setResetArming(false), 3000);
    return () => clearTimeout(t);
  }, [resetArming]);

  const reset = async () => {
    if (!resetArming) { setResetArming(true); return; }
    setResetArming(false);
    try { await storage.delete(KEY); } catch {}
    setBoard(SEED);
    setStatus("стартовые данные");
  };

  const [showImport, setShowImport] = useState(false);

  const mergeImport = (incoming) => {
    const norm = (s) => (s || "").trim().toLowerCase();
    const theses = board.theses.map((t) => ({ ...t, evidence: [...t.evidence] }));
    let newTheses = 0, newEvidence = 0, skipped = 0;
    for (const inc of incoming) {
      const cleanEv = (inc.evidence || [])
        .filter((e) => e && e.text)
        .map((e) => ({
          id: uid(),
          date: e.date || new Date().toISOString().slice(0, 10),
          dir: e.dir === "contra" ? "contra" : "pro",
          w: [1, 2, 3].includes(Number(e.w)) ? Number(e.w) : 2,
          text: String(e.text).trim(),
        }));
      const existing = theses.find((t) => norm(t.title) === norm(inc.title));
      if (existing) {
        for (const ev of cleanEv) {
          if (existing.evidence.some((x) => norm(x.text) === norm(ev.text))) { skipped++; continue; }
          existing.evidence.push(ev);
          newEvidence++;
        }
        if (inc.statement && !existing.statement) existing.statement = String(inc.statement).trim();
      } else if (inc.title) {
        theses.push({ id: uid(), title: String(inc.title).trim(), statement: String(inc.statement || "").trim(), evidence: cleanEv });
        newTheses++;
        newEvidence += cleanEv.length;
      }
    }
    save({ ...board, theses });
    return { newTheses, newEvidence, skipped };
  };

  if (!board) return <div style={{ fontFamily: mono, padding: 40, color: C.inkSoft }}>загрузка…</div>;

  return (
    <div style={{ minHeight: "100vh", background: C.paper, fontFamily: sans, padding: "28px 16px" }}>
      <div style={{ maxWidth: 780, margin: "0 auto" }}>
        <header style={{ marginBottom: 22 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap" }}>
            <h1 style={{ fontFamily: mono, fontSize: 26, fontWeight: 700, letterSpacing: 3, color: C.ink, margin: 0 }}>
              WATCHDOG<span style={{ color: C.amber }}>_</span>
            </h1>
            <span style={{ fontFamily: mono, fontSize: 13, color: C.inkSoft }}>доска гипотез · {status}</span>
            <button onClick={() => setShowImport(!showImport)} style={{ marginLeft: "auto", border: `1px solid ${C.accent}`, borderRadius: 6, background: showImport ? C.accentBg : "none", color: C.accent, fontFamily: mono, fontSize: 13, fontWeight: 700, padding: "4px 10px", cursor: "pointer" }}>
              импорт
            </button>
            <button onClick={reset} style={{ border: `1px solid ${resetArming ? C.contra : C.line}`, borderRadius: 6, background: resetArming ? C.contraBg : "none", color: resetArming ? C.contra : C.inkSoft, fontFamily: mono, fontSize: 13, fontWeight: resetArming ? 700 : 400, padding: "4px 10px", cursor: "pointer" }}>
              {resetArming ? "точно сбросить всё?" : "сброс"}
            </button>
          </div>
          <p style={{ fontSize: 16, color: C.inkSoft, marginTop: 8, lineHeight: 1.5, maxWidth: 640 }}>
            Одна новость — шум. Три новости за месяц в одну сторону — сигнал. Каждый тезис — фальсифицируемая
            гипотеза; свидетельства «за» и «против» с весами двигают баланс. Вердикт пересчитывается автоматически.
          </p>
        </header>

        {showImport && <ImportPanel onImport={mergeImport} onClose={() => setShowImport(false)} />}

        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {board.theses.map((t) => (
            <ThesisCard key={t.id} thesis={t}
              onChange={(next) => save({ ...board, theses: board.theses.map((x) => (x.id === next.id ? next : x)) })}
              onDelete={() => save({ ...board, theses: board.theses.filter((x) => x.id !== t.id) })} />
          ))}
          <AddThesis onAdd={(t) => save({ ...board, theses: [...board.theses, t] })} />
        </div>

        <footer style={{ fontFamily: mono, fontSize: 13, color: C.inkSoft, marginTop: 24, lineHeight: 1.6 }}>
          Ритуал: в новом чате скажите «watchdog» и вставьте текущие тезисы — Claude прогонит свежий поиск
          и предложит новые свидетельства, которые вы внесёте сюда. Данные хранятся между сессиями.
        </footer>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<WatchdogPage />);
</script>
</body>
</html>
