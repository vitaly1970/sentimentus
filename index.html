<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbell · TQQQ + QDTE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#F3F3F4;
    --ink:#1a1a1a;
    --sec:#767676;
    --muted:#9a9a9a;

    --blue:#00A4EF;   --blue-ic:#00679A;
    --gexyellow:#FFB900; --gexyellow-ic:#A67A00; --gexyellow-ink:#6E4A00;
    --green:#66A430;  --green-ic:#456F1E;

    --pink:#D06694;
    --indigo:#4A63C0;
    --yellow:#F0B400;
    --lime:#97AD35;
    --logogreen:#7FBA00;
    --magenta:#BE3E85;
    --violet:#8A57B8;
    --teal:#2B968F;

    --cell:118px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--page);
    font-family:'Space Grotesk',system-ui,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding:40px 20px;
  }
  .wrap{max-width:758px;margin:0 auto}

  .head{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .mark{
    width:42px;height:42px;flex:none;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
  }
  .mark span{display:block}
  .mark .s1{background:#F25022}
  .mark .s2{background:#7FBA00}
  .mark .s3{background:#00A4EF}
  .mark .s4{background:#FFB900}
  .head h1{font-size:20px;font-weight:700;margin:0;letter-spacing:-.01em}
  .head p{font-size:12.5px;color:var(--sec);margin:2px 0 0}

  .grid{
    display:grid;
    grid-template-columns:repeat(6,var(--cell));
    grid-template-rows:repeat(3,var(--cell));
    gap:10px;
    justify-content:center;
  }

  .tile{
    text-decoration:none;
    color:#fff;
    padding:16px;
    display:flex;flex-direction:column;justify-content:space-between;
    border-radius:0;
    transition:filter .12s ease, transform .12s ease;
  }
  .tile:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .tile:focus-visible{outline:3px solid var(--yellow);outline-offset:2px}

  .tile.main{grid-column:1/3;grid-row:1/3;background:var(--blue)}
  .tile.bottom{grid-column:3/5;grid-row:2/4;background:var(--green)}
  .tile.gex{grid-column:5/7;grid-row:1/3;background:var(--gexyellow)}

  .badge{
    width:34px;height:34px;flex:none;
    background:rgba(255,255,255,.96);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;
  }
  .tile.main .badge{color:var(--blue-ic)}
  .tile.gex .badge{color:var(--gexyellow-ic)}
  .tile.gex h2,.tile.gex .go{color:var(--gexyellow-ink)}
  .tile.gex p{color:rgba(90,60,0,.75)}
  .tile.bottom .badge{color:var(--green-ic)}

  .body{margin-top:auto}
  .tile h2{margin:0 0 6px;font-size:16px;font-weight:700;line-height:1.2}
  .tile p{margin:0;font-size:12px;line-height:1.45;color:rgba(255,255,255,.88);font-weight:400}
  .go{margin-top:10px;font-size:12px;font-weight:500}

  .deco{border-radius:0}
  .deco.d1{grid-column:3;grid-row:1;background:var(--pink)}
  .deco.d2{grid-column:4;grid-row:1;background:var(--indigo)}
  .deco.d3{grid-column:1;grid-row:3;background:var(--yellow)}
  .deco.d4{grid-column:2;grid-row:3;background:var(--magenta)}
  .deco.d5{grid-column:5;grid-row:3;background:var(--violet)}
  .deco.d6{grid-column:6;grid-row:3;background:var(--logogreen)}

  .foot{display:flex;align-items:center;gap:8px;margin-top:22px;justify-content:center}
  .foot .dot{width:8px;height:8px;background:var(--yellow);flex:none}
  .foot > span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

  @media (max-width:800px){
    :root{--cell:calc((100vw - 60px)/6)}
    .tile{padding:12px}
    .tile h2{font-size:14px}
    .badge{width:28px;height:28px;font-size:12px}
  }
  @media (max-width:560px){
    :root{--cell:calc((100vw - 60px)/3)}
    .grid{
      grid-template-columns:repeat(3,var(--cell));
      grid-template-rows:repeat(6,var(--cell));
    }
    .tile.main{grid-column:1/3;grid-row:1/3}
    .deco.d1{grid-column:3;grid-row:1}
    .deco.d2{grid-column:3;grid-row:2}
    .tile.gex{grid-column:2/4;grid-row:3/5}
    .deco.d3{grid-column:1;grid-row:3}
    .deco.d4{grid-column:1;grid-row:4}
    .tile.bottom{grid-column:1/3;grid-row:5/7}
    .deco.d5{grid-column:3;grid-row:5}
    .deco.d6{grid-column:3;grid-row:6}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <div class="mark" aria-hidden="true">
      <span class="s1"></span><span class="s2"></span>
      <span class="s3"></span><span class="s4"></span>
    </div>
    <div>
      <h1>Barbell · TQQQ + QDTE</h1>
      <p>Инструменты управления портфелем</p>
    </div>
  </div>

  <div class="grid">

    <a class="tile main" href="advisor.html">
      <div class="badge">С</div>
      <div class="body">
        <h2>Main Strategy</h2>
        <p>Пятничная проверка обоих крыльев</p>
        <div class="go">Открыть →</div>
      </div>
    </a>

    <div class="deco d1" aria-hidden="true"></div>
    <div class="deco d2" aria-hidden="true"></div>

    <a class="tile gex" href="gex.html">
      <div class="badge">G</div>
      <div class="body">
        <h2>GEX — дилерская гамма</h2>
        <p>Уровни дилеров, zero-gamma flip</p>
        <div class="go">Открыть →</div>
      </div>
    </a>

    <a class="tile bottom" href="bottom.html">
      <div class="badge">Д</div>
      <div class="body">
        <h2>Индикатор дна</h2>
        <p>Сигналы капитуляции рынка</p>
        <div class="go">Открыть →</div>
      </div>
    </a>

    <div class="deco d3" aria-hidden="true"></div>
    <div class="deco d4" aria-hidden="true"></div>
    <div class="deco d5" aria-hidden="true"></div>
    <div class="deco d6" aria-hidden="true"></div>

  </div>

  <div class="foot">
    <span class="dot" aria-hidden="true"></span>
    <span>данные Tiingo · обновление по закрытию недели</span>
  </div>

</div>
</body>
</html>
