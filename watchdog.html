// ---------- Вспомогательные ----------
var KEY = "watchdog-board-v1";
function uid(){ return Math.random().toString(36).slice(2, 9); }

function verdict(evidence){
  var pro = 0, con = 0;
  evidence.forEach(function(e){ if(e.dir === "pro") pro += e.w; else con += e.w; });
  var total = pro + con;
  var ratio = total ? pro / total : 0.5;
  var label = "Спорно";
  if (ratio >= 0.7) label = "Подтверждается";
  else if (ratio <= 0.3) label = "Опровергается";
  return { pro: pro, con: con, ratio: ratio, label: label };
}

// Мини-хелпер построения DOM (текст пользователя вставляется через textContent — безопасно)
function el(tag, props){
  var n = document.createElement(tag);
  if (props){
    for (var k in props){
      var v = props[k];
      if (v == null) continue;
      if (k === "style" && typeof v === "object") { for (var s in v) n.style[s] = v[s]; }
      else if (k.slice(0,2) === "on" && typeof v === "function") n.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "class") n.className = v;
      else if (k === "text") n.textContent = v;
      else n.setAttribute(k, v);
    }
  }
  for (var i = 2; i < arguments.length; i++){
    var kid = arguments[i];
    if (kid == null || kid === false) continue;
    if (Object.prototype.toString.call(kid) === "[object Array]") {
      kid.forEach(function(kk){ if(kk!=null && kk!==false) n.appendChild(kk.nodeType ? kk : document.createTextNode(String(kk))); });
    } else {
      n.appendChild(kid.nodeType ? kid : document.createTextNode(String(kid)));
    }
  }
  return n;
}

// ---------- Состояние ----------
var board = null;

function loadBoard(){
  var raw = null;
  try { raw = localStorage.getItem(KEY); } catch(e){}
  board = raw ? JSON.parse(raw) : SEED;
  statusText = raw ? "сохранено" : "стартовые данные";
}
function save(next){
  board = next;
  try {
    var toStore = Object.assign({}, next, { updatedAt: new Date().toISOString().slice(0,10) });
    localStorage.setItem(KEY, JSON.stringify(toStore));
    statusText = "сохранено";
  } catch(e){ statusText = "не удалось сохранить"; }
  render();
}
function resetBoard(){
  try { localStorage.removeItem(KEY); } catch(e){}
  board = SEED;
  statusText = "стартовые данные";
  render();
}

// ---------- Кнопка с подтверждением в два клика ----------
function armButton(opts){
  var btn = el("button", { title: opts.title || "" });
  var armed = false, timer = null;
  function apply(){
    btn.textContent = armed ? opts.armedText : opts.normalText;
    var st = armed ? opts.armedStyle : opts.normalStyle;
    btn.removeAttribute("style");
    for (var s in st) btn.style[s] = st[s];
  }
  btn.addEventListener("click", function(){
    if (armed){ armed = false; clearTimeout(timer); opts.onConfirm(); }
    else { armed = true; apply(); timer = setTimeout(function(){ armed = false; apply(); }, 3000); }
  });
  apply();
  return btn;
}

    el("span", { style:{ color:C.pro }, text:"за "+v.pro }),
    el("span", { style:{ color:C.contra }, text:"против "+v.con })
  );
  return el("div", null, bar, labels);
}

  var v = verdict(t.evidence);
  var badgeColor = v.label === "Подтверждается" ? C.pro : v.label === "Опровергается" ? C.contra : C.amber;
  var sorted = t.evidence.slice().sort(function(a,b){ return a.date < b.date ? 1 : -1; });

  var badge = el("span", { style:{ fontFamily:mono, fontSize:"12px", fontWeight:"700", letterSpacing:"0.5px", color:badgeColor, border:"1px solid "+badgeColor, borderRadius:"3px", padding:"2px 6px" }, text: v.label.toUpperCase() });
  var count = el("span", { style:{ fontFamily:mono, fontSize:"13px", color:C.inkSoft }, text: t.evidence.length + " свидетельств" });

    el("div", { style:{ flex:"1" } },
      el("div", { style:{ display:"flex", gap:"8px", alignItems:"center", flexWrap:"wrap", marginBottom:"6px" } }, badge, count),
      titleEl, stmtEl
    ),
    confirmDeleteBtn("Удалить тезис", function(){
      save(Object.assign({}, board, { theses: board.theses.filter(function(x){ return x.id !== t.id; }) }));
    })
  );

  var evWrap = el("div", { style:{ marginTop:"6px", display:"none" } });
  sorted.forEach(function(ev){
    evWrap.appendChild(evidenceRowNode(ev, function(){
      save(Object.assign({}, board, { theses: board.theses.map(function(x){
        return x.id === t.id ? Object.assign({}, x, { evidence: x.evidence.filter(function(e){ return e.id !== ev.id; }) }) : x;
      }) }));
    }));
  });
  evWrap.appendChild(addEvidenceNode(function(ev){
    save(Object.assign({}, board, { theses: board.theses.map(function(x){
      return x.id === t.id ? Object.assign({}, x, { evidence: x.evidence.concat([ev]) }) : x;
    }) }));
  }));

  var toggle = el("button", { style:{ marginTop:"10px", border:"none", background:"none", color:C.accent, cursor:"pointer", fontFamily:mono, fontSize:"14px", padding:"0" }, text:"▼ развернуть свидетельства" });

  });

  return el("div", { style:{ background:C.card, border:"1px solid "+C.line, borderRadius:"10px", padding:"16px 18px" } },
    head,
    el("div", { style:{ marginTop:"12px" } }, balanceNode(v)),
    toggle,
    evWrap
  );
}

function mergeImport(incoming){
  function norm(s){ return (s || "").trim().toLowerCase(); }
  var theses = board.theses.map(function(t){ return Object.assign({}, t, { evidence: t.evidence.slice() }); });
  var newTheses = 0, newEvidence = 0, skipped = 0;
  incoming.forEach(function(inc){
    var cleanEv = (inc.evidence || []).filter(function(e){ return e && e.text; }).map(function(e){
      return {
        id: uid(),
        date: e.date || new Date().toISOString().slice(0,10),
        dir: e.dir === "contra" ? "contra" : "pro",
        w: [1,2,3].indexOf(Number(e.w)) >= 0 ? Number(e.w) : 2,
        text: String(e.text).trim()
      };
    });
    var existing = null;
    for (var i = 0; i < theses.length; i++){ if (norm(theses[i].title) === norm(inc.title)) { existing = theses[i]; break; } }
    if (existing){
      cleanEv.forEach(function(ev){
        var dup = existing.evidence.some(function(x){ return norm(x.text) === norm(ev.text); });
        if (dup) { skipped++; return; }
        existing.evidence.push(ev); newEvidence++;
      });
      if (inc.statement && !existing.statement) existing.statement = String(inc.statement).trim();
    } else if (inc.title){
      theses.push({ id: uid(), title: String(inc.title).trim(), statement: String(inc.statement || "").trim(), evidence: cleanEv });
      newTheses++; newEvidence += cleanEv.length;
    }
  });
  save(Object.assign({}, board, { theses: theses }));
  return { newTheses: newTheses, newEvidence: newEvidence, skipped: skipped };
}

      var incoming = (Object.prototype.toString.call(data) === "[object Array]") ? data : (data.theses || []);
      if (!incoming.length) throw new Error("empty");
      var r = mergeImport(incoming);
      lastImportMsg = { ok:true, text:"Внесено: тезисов " + r.newTheses + ", свидетельств " + r.newEvidence + ", пропущено дублей " + r.skipped + "." };
      render();
    } catch(e){
      msgEl.textContent = "Не удалось разобрать JSON. Вставьте блок целиком, как его выдал Claude.";
      msgEl.style.color = C.contra;
    }
  });
  var panel = el("div", { style:{ background:C.card, border:"1px solid "+C.accent, borderRadius:"10px", padding:"14px 18px", marginBottom:"14px", display:"flex", flexDirection:"column", gap:"8px" } },
    el("div", { style:{ display:"flex", alignItems:"center" } },
      el("span", { style:{ fontFamily:mono, fontSize:"13px", fontWeight:"700", color:C.accent, letterSpacing:"0.5px" }, text:"ИМПОРТ ИЗ ЧАТА" }),
      closeBtn
    ),
    el("p", { style:{ fontSize:"14.5px", color:C.inkSoft, margin:"0", lineHeight:"1.5" }, text:"Вставьте JSON-блок из ответа Claude. Новые тезисы будут созданы, свидетельства добавятся к существующим тезисам по совпадению названия, точные дубликаты пропускаются." }),
    raw,
    el("div", { style:{ display:"flex", gap:"10px", alignItems:"center", flexWrap:"wrap" } }, runBtn, msgEl)
  );
  if (lastImportMsg){
    msgEl.textContent = lastImportMsg.text;
    msgEl.style.color = lastImportMsg.ok ? C.pro : C.contra;
    lastImportMsg = null;
  }
  return panel;
}

// ---------- Главная отрисовка ----------
function render(){
  var app = document.getElementById("app");
  app.innerHTML = "";

  var wrap = el("div", { style:{ maxWidth:"780px", margin:"0 auto", padding:"28px 16px", fontFamily:sans } });

  var h1 = el("h1", { style:{ fontFamily:mono, fontSize:"26px", fontWeight:"700", letterSpacing:"3px", color:C.ink, margin:"0" } },
    "WATCHDOG", el("span", { style:{ color:C.amber }, text:"_" }));
  var sub = el("span", { style:{ fontFamily:mono, fontSize:"13px", color:C.inkSoft }, text:"доска гипотез · " + statusText });

  var importBtn = el("button", { style:{ marginLeft:"auto", border:"1px solid "+C.accent, borderRadius:"6px", background: showImport?C.accentBg:"none", color:C.accent, fontFamily:mono, fontSize:"13px", fontWeight:"700", padding:"4px 10px", cursor:"pointer" }, text:"импорт" });
  importBtn.addEventListener("click", function(){ showImport = !showImport; render(); });

  var resetBtn = armButton({
    title:"Сбросить к стартовым данным",
    normalText:"сброс", armedText:"точно сбросить всё?",
    onConfirm: resetBoard,
    normalStyle:{ border:"1px solid "+C.line, borderRadius:"6px", background:"none", color:C.inkSoft, fontFamily:mono, fontSize:"13px", fontWeight:"400", padding:"4px 10px", cursor:"pointer" },
    armedStyle:{ border:"1px solid "+C.contra, borderRadius:"6px", background:C.contraBg, color:C.contra, fontFamily:mono, fontSize:"13px", fontWeight:"700", padding:"4px 10px", cursor:"pointer" }
  });

  var headerRow = el("div", { style:{ display:"flex", alignItems:"baseline", gap:"12px", flexWrap:"wrap" } }, h1, sub, importBtn, resetBtn);
  var intro = el("p", { style:{ fontSize:"16px", color:C.inkSoft, marginTop:"8px", lineHeight:"1.5", maxWidth:"640px" }, text:"Одна новость — шум. Три новости за месяц в одну сторону — сигнал. Каждый тезис — фальсифицируемая гипотеза; свидетельства «за» и «против» с весами двигают баланс. Вердикт пересчитывается автоматически." });
  wrap.appendChild(el("header", { style:{ marginBottom:"22px" } }, headerRow, intro));

  if (showImport) wrap.appendChild(importPanelNode());

  var list = el("div", { style:{ display:"flex", flexDirection:"column", gap:"14px" } });
  board.theses.forEach(function(t){ list.appendChild(thesisCardNode(t)); });
  list.appendChild(addThesisNode());
  wrap.appendChild(list);

  wrap.appendChild(el("footer", { style:{ fontFamily:mono, fontSize:"13px", color:C.inkSoft, marginTop:"24px", lineHeight:"1.6" }, text:"Ритуал: в новом чате скажите «watchdog» и вставьте текущие тезисы — Claude прогонит свежий поиск и предложит новые свидетельства, которые вы внесёте сюда. Данные хранятся между сессиями." }));

  app.appendChild(wrap);
}

loadBoard();
render();

} catch(err){
  document.getElementById("app").innerHTML =
    '<pre style="max-width:780px;margin:12px auto;padding:14px 16px;font-family:monospace;font-size:14px;color:#B3402E;background:#F7E7E3;border:1px solid #B3402E;border-radius:8px;white-space:pre-wrap;overflow:auto">Ошибка: ' +
    (err && err.message ? err.message : String(err)) + '\n\n' + (err && err.stack ? err.stack : '') + '</pre>';
}
</script>
