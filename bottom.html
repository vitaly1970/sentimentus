<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Mono&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0E1620;--panel:#17212E;--panel2:#1E2A3A;--ink:#EAF2FB;--ink2:#8FA3B8;--line:#2C3A4C;
--green:#18C37A;--green-bg:#0C3A2A;--green-line:#1FE38F;
--red:#FF5A4D;--red-bg:#3A1512;
--amber:#FFB020;--amber-bg:#3A2A08;
--fear:#FF5A4D;--greed:#18C37A}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'PT Sans',sans-serif;padding:22px;max-width:1060px;margin:0 auto}
.mono{font-family:'PT Mono',monospace}
header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--line);padding-bottom:10px;margin-bottom:18px;flex-wrap:wrap;gap:8px}
h1{font-size:24px;font-weight:700}
#asof{font-size:15px;color:var(--ink2)}
button{font-family:inherit;font-size:15px;padding:7px 18px;border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;border-radius:4px;font-weight:700}
button:hover{background:var(--green);color:#06110C}
button:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.grid{display:grid;grid-template-columns:230px 1fr;gap:18px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.rightcol{display:flex;flex-direction:column;gap:18px;justify-content:flex-start}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px}
.panel h2{font-size:13px;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink2);margin-bottom:12px;font-weight:700}
#status{padding:20px 22px;font-size:26px;font-weight:700;border-radius:10px;margin-bottom:18px;border:2px solid var(--line);background:var(--panel);letter-spacing:.3px}
#status.green{background:var(--green-bg);border-color:var(--green-line);color:var(--green-line);box-shadow:0 0 22px rgba(31,227,143,.35)}
#status.latch{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);box-shadow:0 0 18px rgba(255,176,32,.28)}
#status small{display:block;font-weight:400;font-size:16px;margin-top:6px;color:var(--ink2);letter-spacing:0}
.comp-row{display:grid;grid-template-columns:120px 1fr 92px;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:17px;font-weight:700}
.comp-row:last-child{border-bottom:none}
.bar{height:14px;background:linear-gradient(90deg,#FF5A4D 0%,#FFB020 30%,#2C3A4C 50%,#0F9E63 70%,#18C37A 100%);border:1px solid var(--line);position:relative;border-radius:7px}
.bar .tick{position:absolute;top:-4px;width:4px;height:22px;background:#fff;border-radius:2px;box-shadow:0 0 4px rgba(0,0,0,.6)}
.bar .orline{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--green-line);left:5%;opacity:.7}
.val{text-align:right;font-size:14px}

#sources{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.src{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);
     border-radius:3px;padding:8px 14px;font-size:15px;min-width:170px}
.src .dot{width:11px;height:11px;border-radius:50%;background:var(--ink2);flex:none}
.src.loading .dot{background:var(--amber);animation:pulse 1s infinite}

.src small{display:block;color:var(--ink2);font-size:13px;font-weight:400}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>
<header>
  <h1>Индикатор капитуляции</h1>
  <div><span id="asof" class="mono">данные загружаются…</span>
  <button id="refresh" style="margin-left:12px">Обновить</button></div>
</header>
<div id="status">Загрузка данных…<small>обычно 5–20 секунд; состояние источников — ниже</small></div>
<div id="sources">
  <div class="src" id="src-vix"><span class="dot"></span><span>VIX<small id="src-vix-d">ожидание</small></span></div>
  <div class="src" id="src-vix3m"><span class="dot"></span><span>VIX3M<small id="src-vix3m-d">ожидание</small></span></div>
  <div class="src" id="src-naaim"><span class="dot"></span><span>NAAIM<small id="src-naaim-d">ожидание</small></span></div>
  <div class="src" id="src-hyoas"><span class="dot"></span><span>HY OAS<small id="src-hyoas-d">ожидание</small></span></div>
</div>
<div class="grid">
  <div class="panel"><h2>Композит</h2>
    <svg id="gauge" width="190" height="430" viewBox="0 0 190 430" role="img" aria-label="Шкала композита"></svg></div>
  <div class="rightcol">
    <div class="panel"><h2>Компоненты (каузальный ранг, −10 страх … +10 жадность)</h2>
      <div id="components"></div></div>
  </div>
</div>
<div id="log"></div>
<script>
// ================= ДВИЖОК (паритет с Python подтверждён) =================
// engine.js — точный порт sentiment_engine.py (замороженная спецификация v6)
// Все функции чистые, работают с массивами {t: Date[], v: number[]}.

const SPEC = {
  // name: [invert, ma]  invert=true: высокий сырой = страх
  vix:    [true, 10],
  vix_ts: [true,  5],
  naaim:  [false, 3],
  hy_oas: [true,  5],   // широкий кредитный спред = стресс = страх
  // ── ФАЗА 2 (требует платных / непроверенных источников — сейчас НЕ грузим) ──
  // pc_equity:[true,5], pc_total:[true,5] — CBOE put/call. Бесплатный CDN-архив
  //   (…/volume_and_call_put_ratios/*pcarchive.csv) заморожен на 2012; живой дневной
  //   фид только через CBOE DataShop (платно) либо скрейп daily-market-statistics.
  // aaii:[false,3] — AAII bull-bear (aaii.com/files/surveys/sentiment.xls). Эндпоинт
  //   жив, но доступ нестабилен (логин), поэтому в надёжный контур не берём.
  // breadth:[false,5] — % S&P выше 200DMA / new-lows. Чистого бесплатного фида нет
  //   (investing.com/Barchart/StockCharts — скрейп/платно).
  // Включение любого: 1) раскомментировать в SPEC; 2) в run() загрузить ряд и
  //   parts.<name> = alignFFill(baseT, s, lim); 3) добавить чип src-<name> + строку в ORDER.
};
const CFG = {
  GATE_THR: -8.0,
  OR_THR: -9.0,
  LATCH_N: 63,
  MIN_PERIODS: 756,
};

// скользящая средняя с min_periods=1 (как rolling(ma, min_periods=1).mean())
function rollMean(vals, w) {
  const out = new Array(vals.length).fill(NaN);
  let sum = 0, cnt = 0;
  const q = [];
  for (let i = 0; i < vals.length; i++) {
    const x = vals[i];
    q.push(x);
    if (!Number.isNaN(x)) { sum += x; cnt++; }
    if (q.length > w) {
      const y = q.shift();
      if (!Number.isNaN(y)) { sum -= y; cnt--; }
    }
    out[i] = cnt > 0 ? sum / cnt : NaN;
  }
  return out;
}

// каузальный перцентиль: ранг val[i] строго против предыдущей истории
function causalRank(vals, minPeriods) {
  const n = vals.length;
  const out = new Array(n).fill(NaN);
  const hist = [];
  const insort = (arr, x) => {
    let lo = 0, hi = arr.length;
    while (lo < hi) { const m = (lo + hi) >> 1; if (arr[m] < x) lo = m + 1; else hi = m; }
    arr.splice(lo, 0, x);
  };
  const countLess = (arr, x) => {
    let lo = 0, hi = arr.length;
    while (lo < hi) { const m = (lo + hi) >> 1; if (arr[m] < x) lo = m + 1; else hi = m; }
    return lo;
  };
  for (let i = 0; i < n; i++) {
    const x = vals[i];
    if (!Number.isNaN(x)) {
      if (hist.length >= minPeriods) {
        out[i] = (countLess(hist, x) / hist.length) * 100.0;
      }
      insort(hist, x);
    }
  }
  return out;
}

const toSK = (pct) => pct.map((p) => (Number.isNaN(p) ? NaN : (p / 100) * 20 - 10));

function rankComponent(vals, invert, ma, minPeriods) {
  const proxy = vals.map((x) => (Number.isNaN(x) ? NaN : invert ? -x : x));
  return toSK(causalRank(rollMean(proxy, ma), minPeriods));
}

// equal-композит по доступным компонентам (NaN пропускаются)
function composite(rankCols) {
  const n = rankCols[0].length;
  const out = new Array(n).fill(NaN);
  for (let i = 0; i < n; i++) {
    let s = 0, c = 0;
    for (const col of rankCols) {
      const x = col[i];
      if (!Number.isNaN(x)) { s += x; c++; }
    }
    if (c > 0) out[i] = s / c;
  }
  return out;
}

// green: композит <= GATE_THR ИЛИ любая компонента <= OR_THR
function gateSeries(comp, rankCols, gateThr, orThr) {
  return comp.map((cv, i) => {
    if (!Number.isNaN(cv) && cv <= gateThr) return true;
    for (const col of rankCols) {
      const x = col[i];
      if (!Number.isNaN(x) && x <= orThr) return true;
    }
    return false;
  });
}

// окно: капитуляция была в последние N торговых дней (включая сегодня)
function latchSeries(gate, N) {
  const out = new Array(gate.length).fill(false);
  let last = -1e9;
  for (let i = 0; i < gate.length; i++) {
    if (gate[i]) last = i;
    out[i] = i - last < N;
  }
  return out;
}

// выравнивание ряда на общую бизнес-ось (ось = даты опорного ряда), ffill с лимитом
function alignFFill(baseT, s, limit) {
  const out = new Array(baseT.length).fill(NaN);
  let j = 0, lastV = NaN, lastIdx = -1e9;
  for (let i = 0; i < baseT.length; i++) {
    const t = baseT[i];
    while (j < s.t.length && s.t[j] <= t) {
      if (!Number.isNaN(s.v[j])) { lastV = s.v[j]; lastIdx = i; }
      j++;
    }
    out[i] = i - lastIdx <= limit ? lastV : NaN;
  }
  return out;
}


// ================= ЗАГРУЗКА (таймауты, прокси-фолбэки, живой лог) =================
const ROUTES = [
  [u => "/.netlify/functions/proxy?url=" + encodeURIComponent(u), 26000, "свой прокси"],
  [u => u, 6000, "напрямую"],
  [u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u), 30000, "allorigins"],
  [u => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u), 20000, "codetabs"],
];
async function fetchWithTimeout(url, asBuf, ms) {
  const ctl = new AbortController();
  const timer = setTimeout(() => ctl.abort(), ms);
  try {
    const r = await fetch(url, {cache: "no-store", signal: ctl.signal});
    if (!r.ok) throw new Error("HTTP " + r.status);
    return asBuf ? await r.arrayBuffer() : await r.text();
  } finally { clearTimeout(timer); }
}
function srcStatus(id, state, detail) {
  const el = document.getElementById("src-" + id);
  if (!el) return;
  el.className = "src " + state;
  const d = document.getElementById("src-" + id + "-d");
  if (d) d.textContent = detail || "";
}
const deadRoutes = new Set();
const sleep = ms => new Promise(r => setTimeout(r, ms));
async function fetchText(url, log, label, srcId) {
  for (let i = 0; i < ROUTES.length; i++) {
    const [wrap, ms, rname] = ROUTES[i];
    if (deadRoutes.has(rname)) continue;
    if (srcId) srcStatus(srcId, "loading", rname + "…");
    try {
      const t = await fetchWithTimeout(wrap(url), false, ms);
      if (t.length < 200) throw new Error("пустой ответ");
      if (label) log("✓ " + label + " (" + rname + ")");
      return t;
    } catch (e) {
      const why = e.name === "AbortError" ? "таймаут" : e.message;
      if (rname === "свой прокси" && /404/.test(why)) {
        deadRoutes.add(rname);
        log("· свой прокси не задеплоен (404) — пропускаю его до конца сессии");
      } else if (label) log("… " + label + ": " + rname + " (" + why + ")");
      await sleep(250);
    }
  }
  if (label) log("✗ " + label + ": все маршруты исчерпаны");
  return null;
}
async function fetchBuf(url) {
  for (const [wrap, ms] of ROUTES) {
    try {
      const b = await fetchWithTimeout(wrap(url), true, ms);
      if (b.byteLength < 500) throw new Error("short");
      return b;
    } catch (e) { /* next */ }
  }
  return null;
}
function parseCboe(text) {   // *_History.csv (VIX, VIX3M): DATE,OPEN,HIGH,LOW,CLOSE
  const t = [], v = [];
  for (const line of text.split("\n")) {
    const p = line.split(",");
    if (p.length < 5 || p[0].toUpperCase().startsWith("DATE")) continue;
    const d = new Date(p[0]); const c = parseFloat(p[4]);
    if (!isNaN(d) && isFinite(c)) { t.push(d); v.push(c); }
  }
  return {t, v};
}
function parseYahoo(text) {   // v8 chart JSON -> {t, v} по adjclose
  let obj;
  try { obj = JSON.parse(text); }
  catch (e) { return {t: [], v: [], err: "не JSON"}; }
  const chart = obj && obj.chart;
  if (chart && chart.error) return {t: [], v: [], err: "Yahoo error"};
  const r = chart && chart.result && chart.result[0];
  if (!r || !r.timestamp) return {t: [], v: [], err: "нет result/timestamp"};
  const ts = r.timestamp;
  const ind = r.indicators || {};
  const adj = ind.adjclose && ind.adjclose[0] && ind.adjclose[0].adjclose;
  const cls = ind.quote && ind.quote[0] && ind.quote[0].close;
  const srcArr = (adj && adj.some(x => x != null)) ? adj : cls;
  if (!srcArr) return {t: [], v: [], err: "нет close-массива"};
  const t = [], v = [];
  for (let i = 0; i < ts.length; i++) {
    const c = srcArr[i];
    if (c != null && isFinite(c)) { t.push(new Date(ts[i] * 1000)); v.push(c); }
  }
  return {t, v};
}
// FRED fredgraph.csv: <date>,<value> ; заголовок в строке 0; пропуски = "."
function parseFred(text) {
  const t = [], v = [];
  const lines = text.split("\n");
  for (let i = 1; i < lines.length; i++) {
    const p = lines[i].split(",");
    if (p.length < 2) continue;
    const d = new Date(p[0].trim());
    const raw = p[1].trim();
    const x = parseFloat(raw);
    if (!isNaN(d) && raw !== "." && isFinite(x)) { t.push(d); v.push(x); }
  }
  return {t, v};
}
function sortDedup(t, v) {
  const idx = t.map((_, i) => i).sort((a, b) => t[a] - t[b]);
  const t2 = [], v2 = [];
  for (const i of idx) {
    if (t2.length && +t2[t2.length-1] === +t[i]) v2[v2.length-1] = v[i];
    else { t2.push(t[i]); v2.push(v[i]); }
  }
  return {t: t2, v: v2};
}
// ---- NAAIM (xlsx) ----
async function loadNaaimInner(log) {
  srcStatus("naaim", "loading", "поиск xlsx…");
  if (typeof XLSX === "undefined") { log("✗ NAAIM: библиотека xlsx не загрузилась"); return null; }
  let urls = ["https://naaim.org/wp-content/uploads/2024/01/NAAIM-Exposure-Index.xlsx",
              "https://naaim.org/wp-content/uploads/NAAIM-Exposure-Index.xlsx"];
  const page = await fetchText("https://naaim.org/programs/naaim-exposure-index/", log, null);
  if (page) {
    const found = [...page.matchAll(/href="([^"]+\.xlsx)"/g)].map(m => m[1]);
    urls = [...found, ...urls];
  }
  for (const u of urls.slice(0, 4)) {
    const buf = await fetchBuf(u);
    if (!buf) continue;
    try {
      const wb = XLSX.read(buf, {type: "array", cellDates: true});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
      const head = rows[0].map(c => String(c).trim().toLowerCase());
      const di = head.findIndex(c => c.includes("date"));
      const mi = head.findIndex(c => ["naaim exposure index","mean/average","mean"].includes(c));
      if (di < 0 || mi < 0) continue;
      const t = [], v = [];
      for (const r of rows.slice(1)) {
        const d = r[di] instanceof Date ? r[di] : new Date(r[di]);
        const x = parseFloat(r[mi]);
        if (!isNaN(d) && isFinite(x)) { t.push(d); v.push(x); }
      }
      if (t.length < 300) continue;
      const s = sortDedup(t, v);
      log("✓ NAAIM (" + s.t.length + " недель)");
      return s;
    } catch (e) { /* next url */ }
  }
  log("✗ NAAIM не загрузился");
  return null;
}
function raceBudget(fn, log, ms) {
  return Promise.race([
    fn(log).catch(e => { log("✗ " + e.message); return null; }),
    new Promise(res => setTimeout(() => res(null), ms)),
  ]);
}
const fresh = s => s && s.t.length > 500 &&
  (Date.now() - +s.t[s.t.length-1]) < 45*864e5;

// ================= ПАЙПЛАЙН =================
async function run() {
  const logEl = document.getElementById("log");
  logEl.textContent = "";
  const log = m => { logEl.textContent += m + "\n"; };
  const st = document.getElementById("status");
  st.className = "";
  st.innerHTML = "Загрузка данных…<small>состояние источников — на панели ниже</small>";
  const CHIPS = ["vix", "vix3m", "naaim", "hyoas"];
  for (const s of CHIPS) srcStatus(s, "loading", "ожидание…");

  log("→ запрашиваю VIX, VIX3M, HY OAS, NAAIM…");
  const safe = p => p.catch(e => { log("✗ " + e.message); return null; });

  async function loadIdx(name, yahooSym, srcId) {   // CBOE -> Yahoo
    let t = await fetchText("https://cdn.cboe.com/api/global/us_indices/daily_prices/" +
                            name + "_History.csv", log, name + " (CBOE)", srcId);
    let s = t ? parseCboe(t) : null;
    if (fresh(s)) return s;
    t = await fetchText("https://query1.finance.yahoo.com/v8/finance/chart/" +
                        yahooSym + "?range=max&interval=1d", log, name + " (Yahoo)", srcId);
    return t ? parseYahoo(t) : s;
  }
  async function loadFred(id, label, srcId) {
    const t = await fetchText("https://fred.stlouisfed.org/graph/fredgraph.csv?id=" + id, log, label, srcId);
    return t ? parseFred(t) : null;
  }

  // ПОСЛЕДОВАТЕЛЬНАЯ загрузка (публичные прокси режут параллельные залпы)
  let vix   = await safe(loadIdx("VIX", "%5EVIX", "vix"));
  let v3m   = await safe(loadIdx("VIX3M", "%5EVIX3M", "vix3m"));
  let hyoas = await safe(loadFred("BAMLH0A0HYM2", "HY OAS (FRED)", "hyoas"));
  let naaim = await safe(raceBudget(loadNaaimInner, log, 45000));

  // второй круг только для критичных VIX/VIX3M
  if (!fresh(vix) || !fresh(v3m)) {
    log("→ второй круг для VIX/VIX3M (пауза 3 с)…");
    await sleep(3000);
    if (!fresh(vix)) vix = await safe(loadIdx("VIX", "%5EVIX", "vix"));
    if (!fresh(v3m)) v3m = await safe(loadIdx("VIX3M", "%5EVIX3M", "vix3m"));
  }

  // финализация чипов
  const iso = s => s.t[s.t.length-1].toISOString().slice(0, 10);
  srcStatus("vix",   fresh(vix)  ? "ok" : "fail", fresh(vix)  ? "по " + iso(vix)  : "не загрузился");
  srcStatus("vix3m", fresh(v3m)  ? "ok" : "fail", fresh(v3m)  ? "по " + iso(v3m)  : "неактивен");
  srcStatus("naaim", fresh(naaim)? "ok" : "fail", fresh(naaim)? naaim.t.length + " недель" : "неактивен");
  srcStatus("hyoas", fresh(hyoas)? "ok" : "fail", fresh(hyoas)? "по " + iso(hyoas): "неактивен");

  if (!fresh(vix)) {
    st.innerHTML = "VIX не загрузился — прибор не может работать." +
      "<small>Нажмите «Обновить» через минуту.</small>";
    return;
  }

  const baseT = vix.t;
  const parts = {vix: vix.v.slice()};
  if (fresh(v3m)) {
    const a3 = alignFFill(baseT, v3m, 3);
    parts.vix_ts = vix.v.map((x, i) => (isFinite(a3[i]) ? x / a3[i] : NaN));
  } else log("✗ vix_ts неактивен — flash-детектор выключен");
  if (fresh(naaim)) parts.naaim  = alignFFill(baseT, naaim, 7);
  if (fresh(hyoas)) parts.hy_oas = alignFFill(baseT, hyoas, 5);

  log("→ считаю каузальные ранги (" + baseT.length + " дней, компонент: " +
      Object.keys(parts).length + ")…");
  await new Promise(r => setTimeout(r, 30));
  const names = Object.keys(parts);
  const ranks = {};
  for (const n of names) {
    const [inv, ma] = SPEC[n];
    ranks[n] = rankComponent(parts[n], inv, ma, CFG.MIN_PERIODS);
  }
  const cols  = names.map(n => ranks[n]);
  const comp  = composite(cols);
  const gate  = gateSeries(comp, cols, CFG.GATE_THR, CFG.OR_THR);
  const latch = latchSeries(gate, CFG.LATCH_N);
  const last  = comp.length - 1;
  document.getElementById("asof").textContent = baseT[last].toISOString().slice(0, 10);

  if (gate[last]) {
    st.className = "green";
    st.innerHTML = "Капитуляция сейчас<small>условие глубоких траншей подтверждено</small>";
  } else if (latch[last]) {
    let gi = last; while (!gate[gi]) gi--;
    st.className = "latch";
    st.innerHTML = "Пик капитуляции пройден<small>" + (last - gi) +
      " торг. дн. назад (" + baseT[gi].toISOString().slice(0,10) +
      "), окно " + CFG.LATCH_N + "</small>";
  } else {
    st.className = "";
    st.innerHTML = "Нейтрально — капитуляции нет<small>и не было в окне " +
      CFG.LATCH_N + " дн.</small>";
  }

  // шкала
  const y = v => 215 - v * 19.5;
  let svg = '<rect x="82" y="' + y(10) + '" width="26" height="' + (y(-10)-y(10)) +
            '" fill="#1E2A3A" stroke="#2C3A4C"/>' +
            '<rect x="82" y="' + y(CFG.GATE_THR) + '" width="26" height="' +
            (y(-10)-y(CFG.GATE_THR)) + '" fill="#0C3A2A"/>' +
            '<rect x="82" y="' + y(10) + '" width="26" height="' + (y(8)-y(10)) +
            '" fill="#3A1512"/>';
  for (let v = -10; v <= 10; v += 2) {
    svg += '<line x1="70" x2="82" y1="' + y(v) + '" y2="' + y(v) + '" stroke="#5A6B78"/>' +
           '<text x="64" y="' + (y(v)+4) + '" text-anchor="end" font-size="13" ' +
           'font-family="PT Mono" fill="#8FA3B8">' + (v>0?"+"+v:v) + '</text>';
  }
  svg += '<text x="122" y="' + y(-9) + '" font-size="14" font-weight="bold" fill="#1FE38F">пик</text>';
  const cv = comp[last];
  if (isFinite(cv)) {
    const col = cv <= CFG.GATE_THR ? "#1FE38F" : cv <= -4 ? "#FFB020" : cv >= 8 ? "#FF5A4D" : "#EAF2FB";
    svg += '<polygon points="110,' + y(cv) + ' 128,' + (y(cv)-9) + ' 128,' + (y(cv)+9) +
           '" fill="' + col + '"/><text x="136" y="' + (y(cv)+6) +
           '" font-size="22" font-weight="bold" font-family="PT Mono" fill="' + col + '">' +
           (cv>0?"+":"") + cv.toFixed(1) + '</text>';
  }
  document.getElementById("gauge").innerHTML = svg;

  // компоненты
  const compDiv = document.getElementById("components");
  compDiv.innerHTML = "";
  const RU = {vix: "VIX", vix_ts: "VIX/VIX3M", naaim: "NAAIM", hy_oas: "HY OAS"};
  const ORDER = ["vix", "vix_ts", "naaim", "hy_oas"];
  for (const n of ORDER) {
    const row = document.createElement("div");
    row.className = "comp-row";
    if (!(n in ranks)) {
      row.innerHTML = '<span>' + RU[n] + '</span><span class="dead">источник недоступен</span>' +
                      '<span class="val dead">n/a</span>';
    } else {
      const rv = ranks[n][last];
      const pct = isFinite(rv) ? ((rv + 10) / 20 * 100) : 50;
      const ext = isFinite(rv) && rv <= CFG.OR_THR;
      row.innerHTML = '<span>' + RU[n] + '</span>' +
        '<span class="bar"><span class="orline"></span>' +
        '<span class="tick" style="left:calc(' + pct + '% - 1px)"></span></span>' +
        '<span class="val' + (ext ? ' extreme' : '') + '">' +
        (isFinite(rv) ? (rv>0?"+":"") + rv.toFixed(1) + (ext ? " ◀OR" : "") : "n/a") + '</span>';
    }
    compDiv.appendChild(row);
  }

  log("готово");
}
async function runSafe() {
  try { await run(); }
  catch (e) {
    document.getElementById("status").textContent = "Ошибка: " + e.message;
    document.getElementById("log").textContent += "✗ EXCEPTION: " + (e.stack || e.message) + "\n";
  }
}
document.getElementById("refresh").addEventListener("click", runSafe);
runSafe();
</script>
</body>
</html>
