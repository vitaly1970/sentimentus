<body>
<div class="wrap">
  <a class="back" href="index.html">← все инструменты</a>
  <div class="topbar">
    <a class="home" href="index.html">Main Strategy</a>
    <span class="meta" id="meta">данные не загружены</span>
  </div>

  <div class="state-row">
    <span class="lab">состояние:</span>
    <select id="state" title="Состояние TQQQ">
      <option value="POS">TQQQ: в позиции 100%</option>

    <select id="lastlvl" title="Последний уровень TQQQ" style="display:none">

    </select>
    <select id="qstate" title="Состояние QDTE">
      <option value="FULL">QDTE: 100%</option>
      <option value="HALF">QDTE: 50% в SGOV</option>
      <option value="OUT">QDTE: 100% в SGOV</option>
    </select>
  </div>

  <div class="warnbar" id="warnbar"></div>

  <div class="livehint">Все цифры — внутридневные (Tiingo IEX). Сигнал выхода/возврата читается по закрытию недели — в пятницу вечером.</div>

  <div id="out" style="display:none">
    <div class="wing">
      <div class="wing-head"><span class="wing-title">TQQQ</span><span class="wing-nums" id="tq-nums"></span></div>
      <div class="wing-grid"><div class="therm" id="tq-therm"></div><div class="rows" id="tq-rows"></div></div>
    </div>
    <div class="wing">
      <div class="wing-head"><span class="wing-title">QDTE</span><span class="wing-nums" id="qd-nums"></span></div>
      <div class="wing-grid"><div class="therm" id="qd-therm"></div><div class="rows" id="qd-rows"></div></div>
      <div class="health" id="qd-health"></div>
    </div>
  </div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const MULT={yellow:0.947,exit:0.888,t1:0.794,t2:0.705,t3:0.585,bear:0.80};
const DD={yellow:-5.3,exit:-11.2,t1:-20.6,t2:-29.5,t3:-41.5,bear:-20.0};

/* ---- состояние в браузере ---- */
const mem={},store={
  get k(){try{return window.localStorage}catch(e){return null}},
  read(k){try{return this.k?this.k.getItem(k):(mem[k]||null)}catch(e){return mem[k]||null}},
  write(k,v){try{if(this.k){this.k.setItem(k,v);return}}catch(e){}mem[k]=v;}
};
['state','lastlvl','qstate'].forEach(id=>{const s=store.read('adv_'+id);if(s!==null)$(id).value=s;
  $(id).addEventListener('change',()=>{store.write('adv_'+id,$(id).value);sync();if(window.__loaded)runAdvisor();});});
function sync(){$('lastlvl').style.display=$('state').value==='CASH'?'':'none';}
sync();
function log(s){ if(window.console) console.log(s); }

/* ---- данные через бэкенд Tiingo (ключ на сервере) ---- */
async function getData(sym,start){
  const url=`/api/tiingo?symbol=${encodeURIComponent(sym)}&start=${start||'1999-01-01'}`;
  const r=await fetch(url);
  const js=await r.json();
  if(!r.ok||js.error){throw new Error(js.error?`${sym}: ${js.error}`:`${sym}: HTTP ${r.status}`);}
  if(!Array.isArray(js)||!js.length)throw new Error(`${sym}: пустой ответ`);
  const rows=js.map(x=>({d:x.date.slice(0,10),o:+x.open,h:+x.high,l:+x.low,c:+x.close,
    adj:(x.adjClose!=null?+x.adjClose:+x.close),div:(+x.divCash||0)}));
  log(`${sym}: ${rows.length} дн., бар ${rows[rows.length-1].d} (Tiingo)`);
  return rows;
}

/* ---- живая (внутридневная) цена через IEX ---- */
async function getLive(sym){
  const r=await fetch(`/api/tiingo?symbol=${encodeURIComponent(sym)}&mode=iex`);
  const js=await r.json();
  if(!r.ok||js.error)throw new Error(js.error?`${sym} live: ${js.error}`:`${sym} live: HTTP ${r.status}`);
  const q=Array.isArray(js)?js[0]:js;
  const p=q&&(q.tngoLast!=null?q.tngoLast:(q.last!=null?q.last:q.prevClose));
  if(p==null||!isFinite(+p))throw new Error(`${sym} live: нет цены`);
  log(`${sym}: живая ${(+p).toFixed(2)} (IEX)`);
  return +p;
}

/* ---- ISO-неделя (для определения текущей недели) ---- */
function isoWeekKey(dt){
  const day=(dt.getUTCDay()+6)%7,th=new Date(dt);th.setUTCDate(dt.getUTCDate()-day+3);
  const y=th.getUTCFullYear(),j4=new Date(Date.UTC(y,0,4));
  const w=1+Math.round(((th-j4)/864e5-3+((j4.getUTCDay()+6)%7))/7);
  return y*100+w;
}

/* ---- индикаторы (порт из бэктеста, сверено с TradingView) ---- */
function ewm(a,al){const o=new Array(a.length);let s=a[0]||0;o[0]=s;for(let i=1;i<a.length;i++){s=al*a[i]+(1-al)*s;o[i]=s;}return o;}
function adxChop(rows,n=14){
  const N=rows.length,tr=new Array(N).fill(0),pdm=new Array(N).fill(0),mdm=new Array(N).fill(0);
  for(let i=1;i<N;i++){const h=rows[i].h,l=rows[i].l,pc=rows[i-1].c;
    tr[i]=Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc));
    const up=h-rows[i-1].h,dn=rows[i-1].l-l;pdm[i]=(up>dn&&up>0)?up:0;mdm[i]=(dn>up&&dn>0)?dn:0;}
  const a=1/n,atr=ewm(tr,a),pd=ewm(pdm,a),md=ewm(mdm,a),dx=new Array(N).fill(0);
  for(let i=0;i<N;i++){const p=100*pd[i]/(atr[i]||1e-9),m=100*md[i]/(atr[i]||1e-9);dx[i]=(p+m)?100*Math.abs(p-m)/(p+m):0;}
  const adx=ewm(dx,a);let chop=NaN;
  if(N>n){let s=0,hi=-1e9,lo=1e9;for(let i=N-n;i<N;i++){s+=tr[i];hi=Math.max(hi,rows[i].h);lo=Math.min(lo,rows[i].l);}chop=100*Math.log10(s/(hi-lo))/Math.log10(n);}
  return{adx:adx[N-1],chop};
}
function weeklyCloses(rows){const wk=[];let cur=null,last=null;
  for(const r of rows){const dt=new Date(r.d+'T12:00:00Z');
    const day=(dt.getUTCDay()+6)%7,th=new Date(dt);th.setUTCDate(dt.getUTCDate()-day+3);
    const y=th.getUTCFullYear(),j4=new Date(Date.UTC(y,0,4));
    const w=1+Math.round(((th-j4)/864e5-3+((j4.getUTCDay()+6)%7))/7),key=y*100+w;
    if(key!==cur){if(last)wk.push(last);cur=key;}last={key,c:r.c,d:r.d};}
  if(last)wk.push(last);return wk;}

const fmt=x=>'$'+x.toFixed(2), f1=x=>'$'+x.toFixed(1);

/* ---- термометр TQQQ (двойной) ---- */
function thermTQQQ(ath,cur,tqCur,tqAth){
  const Y={ath:30,yellow:98,exit:158,t1:220,t2:282,t3:342};
  const ddCur=100*(cur/ath-1);
  const yCur=Math.max(46,30+(98-30)*Math.min(1,(-ddCur)/5.3));
  const L={};for(const k of['yellow','exit','t1','t2','t3'])L[k]=ath*MULT[k];
  const tq=k=>tqCur*Math.pow(L[k]/cur,3);
  const R=(y,pL,pR,dd,col,b)=>{const w=b?4:2.5,fw=b?'600':'400';
    return`<line x1="92" y1="${y}" x2="108" y2="${y}" stroke="${col}" stroke-width="${w}"/>`+
    `<line x1="292" y1="${y}" x2="308" y2="${y}" stroke="${col}" stroke-width="${w}"/>`+
    `<text x="86" y="${y+5}" fill="${col}" text-anchor="end" font-weight="${fw}">${pL}</text>`+
    `<text x="314" y="${y+5}" fill="${col}" font-weight="${fw}">${pR}</text>`+
    `<text x="200" y="${y+5}" fill="${col}" text-anchor="middle" font-weight="${fw}">${dd}</text>`;};
  let g=R(Y.ath,fmt(ath),'ATH','','var(--sec)',false);
  // подписи текущей цены не должны налезать на соседние уровни (ATH сверху, −5,3% снизу):
  // сама точка и линия остаются на правдивом месте, сдвигаются только подписи
  const GAP=16;let yTxt=yCur;
  if(yTxt-Y.ath<GAP)yTxt=Y.ath+GAP;
  if(Y.yellow-yTxt<GAP)yTxt=Y.yellow-GAP;
  g+=`<line x1="100" y1="${yCur}" x2="300" y2="${yCur}" stroke="#378ADD" stroke-dasharray="3 4" opacity="0.4"/>`+
     `<circle cx="100" cy="${yCur}" r="8" fill="#378ADD" stroke="var(--surf)" stroke-width="2"/>`+
     `<circle cx="300" cy="${yCur}" r="8" fill="#378ADD" stroke="var(--surf)" stroke-width="2"/>`+
     `<text x="86" y="${yTxt+5}" fill="var(--ink)" text-anchor="end" font-weight="600">${fmt(cur)}</text>`+
     `<text x="314" y="${yTxt+5}" fill="var(--ink)" font-weight="600">${fmt(tqCur)}</text>`+
     `<text x="200" y="${yTxt+5}" fill="var(--ink)" text-anchor="middle" font-weight="600">${ddCur.toFixed(1)}%</text>`;
  g+=R(Y.yellow,fmt(L.yellow),f1(tq('yellow')),'−5,3%','#7E4A0A',true);
  g+=R(Y.exit,fmt(L.exit),f1(tq('exit')),'−11,2%','#9E2B2B',true);
  g+=R(Y.t1,fmt(L.t1),f1(tq('t1')),'−20,6%','var(--sec)',false);
  g+=R(Y.t2,fmt(L.t2),f1(tq('t2')),'−29,5%','var(--sec)',false);
  g+=R(Y.t3,fmt(L.t3),f1(tq('t3')),'−41,5%','var(--sec)',false);
  return`<svg viewBox="0 0 400 356" role="img" style="width:100%"><title>Термометры QQQ и TQQQ</title>
    <text x="100" y="15" font-size="14" font-family="var(--mono)" fill="var(--sec)" text-anchor="middle">QQQ</text>
    <text x="300" y="15" font-size="14" font-family="var(--mono)" fill="var(--sec)" text-anchor="middle">TQQQ</text>
    <line x1="100" y1="26" x2="100" y2="348" stroke="var(--rule2)" stroke-width="2.5"/>
    <line x1="300" y1="26" x2="300" y2="348" stroke="var(--rule2)" stroke-width="2.5"/>
    <g font-size="15" font-family="var(--mono)">${g}</g></svg>`;
}

/* ---- термометр QDTE (одиночный, статусы) ---- */
function thermQDTE(ath,cur){
  const ddCur=100*(cur/ath-1);
  const L={yellow:ath*MULT.yellow,exit:ath*MULT.exit,bear:ath*MULT.bear};
  const yCur=Math.max(70,30+(112-30)*Math.min(1,(-ddCur)/5.3));
  const row=(y,p,t,col)=>`<line x1="92" y1="${y}" x2="108" y2="${y}" stroke="${col}" stroke-width="4"/>`+
    `<text x="86" y="${y+5}" fill="${col}" text-anchor="end" font-weight="600">${p}</text>`+
    `<text x="116" y="${y+5}" fill="${col}" font-weight="600">${t}</text>`;
  let g=`<line x1="92" y1="30" x2="108" y2="30" stroke="var(--rule2)" stroke-width="2.5"/>`+
    `<text x="86" y="35" fill="var(--sec)" text-anchor="end">${fmt(ath)}</text><text x="116" y="35" fill="var(--muted)" font-size="12">ATH</text>`;
  g+=`<circle cx="100" cy="${yCur}" r="8" fill="#378ADD" stroke="var(--surf)" stroke-width="2"/>`+
    `<text x="86" y="${yCur+5}" fill="var(--ink)" text-anchor="end" font-weight="600">${fmt(cur)}</text>`+
    `<text x="116" y="${yCur+5}" fill="var(--ok)" font-weight="600">${ddCur.toFixed(1)}% · норма</text>`;
  g+=row(132,fmt(L.yellow),'−5,3% · жёлтый','#7E4A0A');
  g+=row(210,fmt(L.exit),'−11,2% · красный','#9E2B2B');
  g+=row(330,fmt(L.bear),'−20,0% · медвежий','#26215C');
  return`<svg viewBox="0 0 400 360" role="img" style="width:100%"><title>Термометр QQQ · статусы QDTE</title>
    <text x="100" y="15" font-size="14" font-family="var(--mono)" fill="var(--sec)" text-anchor="middle">QQQ</text>
    <line x1="100" y1="26" x2="100" y2="350" stroke="var(--rule2)" stroke-width="2.5"/>
    <g font-size="15" font-family="var(--mono)">${g}</g></svg>`;
}

/* ---- прогон ---- */
async function runAdvisor(){
  $('warnbar').style.display='none';
  $('meta').textContent='загрузка данных…';
  try{
    const q=await getData('QQQ','1999-01-01');
    let qqqLive=null;try{qqqLive=await getLive('QQQ');}catch(e){log('QQQ live: '+e.message);}
    let tqCur=null,tqAth=null;
    try{const t=await getData('TQQQ','2010-02-01');tqAth=Math.max(...t.map(r=>r.c));
      let tl=null;try{tl=await getLive('TQQQ');}catch(e){log('TQQQ live: '+e.message);}
      tqCur=(tl!=null?tl:t[t.length-1].c);}
    catch(e){log('TQQQ: '+e.message);}
    let qdCur=null,qdDivs=null;
    try{const qd=await getData('QDTE','2024-03-01');
      let ql=null;try{ql=await getLive('QDTE');}catch(e){log('QDTE live: '+e.message);}
      qdCur=(ql!=null?ql:qd[qd.length-1].c);
      qdDivs=qd.filter(r=>r.div>0).map(r=>({d:r.d,a:r.div}));}
    catch(e){log('QDTE: '+e.message);}

    const last=q[q.length-1],ath=Math.max(...q.map(r=>r.c));
    const live=(qqqLive!=null);            // удалось ли получить внутридневную цену
    const cur=(live?qqqLive:last.c);       // «текущая» цена QQQ: живая, иначе последнее закрытие
    const dd=100*(cur/ath-1);
    const {adx,chop}=adxChop(q);
    // недельный сигнал: живая цена = предварительное закрытие текущей недели
    const wk=weeklyCloses(q);
    const nowKey=isoWeekKey(new Date()),lastBarKey=wk[wk.length-1].key;
    const curW=cur;
    const prevW=(lastBarKey===nowKey?wk[wk.length-2].c:wk[wk.length-1].c);
    const lastDate=new Date(last.d+'T12:00:00Z'),dow=lastDate.getUTCDay();
    const fri=new Date(lastDate);fri.setUTCDate(lastDate.getUTCDate()+((5-dow+7)%7));fri.setUTCHours(22,0,0,0);
    const weekDone=dow===5||Date.now()>fri.getTime();
    const stale=Math.round((Date.now()-lastDate.getTime())/864e5);
    $('meta').textContent=`бар ${last.d}`+(stale>4?` · устарело ${stale} дн.`:'')+(weekDone?' · неделя закрыта':' · неделя не закрыта')+(live?' · цена LIVE':' · цена: закрытие');

    const L={};for(const k in MULT)L[k]=ath*MULT[k];
    const tqAt=k=>tqCur?tqCur*Math.pow(L[k]/cur,3):null;

    /* ===== TQQQ ===== */
    $('tq-nums').innerHTML=`QQQ <b>${fmt(cur)}</b> · ATH <b>${fmt(ath)}</b>`+
      (tqCur?` &nbsp;|&nbsp; TQQQ <b>${fmt(tqCur)}</b>`:'');
    $('tq-therm').innerHTML=tqCur?thermTQQQ(ath,cur,tqCur,tqAth):
      `<div style="color:var(--sec);font-size:.9rem;padding:16px 0">Цена TQQQ недоступна. Уровни QQQ: выход ${fmt(L.exit)}, транши ${fmt(L.t1)}/${fmt(L.t2)}/${fmt(L.t3)}.</div>`;

    // статус (цвет от просадки QQQ)
    let stName,stCls;
    if(dd>DD.yellow){stName='норма';stCls='b-ok';}
    else if(dd>DD.exit){stName='жёлтый';stCls='b-warn';}
    else if(dd>DD.bear){stName='красный';stCls='b-red';}
    else{stName='медвежий';stCls='b-bear';}

    // сигнал (состояние позиции + действие)
    const st=$('state').value;let sig,fore,foreSub='';
    if(st==='POS'){
      const exitSig=prevW>L.exit&&curW<=L.exit;
      if(exitSig){
        sig=`<span class="soft">Пересечён −11,2%.</span> Продать 100% TQQQ → SGOV. Выставить лимитки траншей.`;
        fore=`после выхода — лестница, транш 1 на уровне QQQ ${fmt(L.t1)}`;
      }else{
        sig=`В позиции 100%. <span class="soft">Действий нет</span>`;
        const te=tqAt('exit');
        fore=te?`выход · продать TQQQ ниже <span class="price">${fmt(te)}</span> <span class="ref">при QQQ — ${fmt(L.exit)}</span>`
               :`выход при закрытии недели ниже QQQ ${fmt(L.exit)}`;
      }
    }else{
      const lv=$('lastlvl').value;
      const key={exit:'exit',t1:'t1',t2:'t2',t3:'t3'}[lv];
      const ref=L[key],tqRef=tqAt(key);
      const refTxt=tqRef?`<span class="price">${fmt(tqRef)}</span> <span class="ref">при QQQ — ${fmt(ref)}</span>`:`при QQQ — ${fmt(ref)}`;
      const okRe=curW>ref&&adx>25&&chop<45;
      const order=['exit','t1','t2','t3'],idx=order.indexOf(key),nxt=order[idx+1];
      const nxtName={t1:'транш 2',t2:'транш 3',t3:null}[key];
      // позиции по фазе
      const posMap={exit:['В SGOV 100%',null],t1:['В позиции 10%, в SGOV 90%','транш 2'],
        t2:['В позиции 35%, в SGOV 65%','транш 3'],t3:['В позиции 100%. Лестница отработана полностью',null]};
      const [posTxt,waitT]=posMap[key];
      if(okRe){
        sig=`<span class="soft">Прошёл разворот тренда.</span> Возврат остатка в позицию.`+(weekDone?'':' <span class="ref">(неделя не закрыта)</span>');
      }else if(key==='t3'){
        sig=`${posTxt}. <span class="soft">Ждём возврат остатка на уровне ${refTxt}</span>`;
      }else{
        sig=`${posTxt}. <span class="soft">Ждём ${waitT} или возврат остатка на уровне ${refTxt}</span>`;
      }
      if(nxt&&nxtName){const tn=tqAt(nxt);
        fore=`${nxtName} · докупить TQQQ на уровне <span class="price">${tn?fmt(tn):''}</span> <span class="ref">при QQQ — ${fmt(L[nxt])}</span>`;}
      else fore='лестница исчерпана — ждём возврата остатка';
      foreSub=`возврат при закрытии выше уровня-ордера + ADX&gt;25 + CHOP&lt;45 · сейчас ADX ${adx.toFixed(1)}, CHOP ${chop.toFixed(1)}`;
    }
    $('tq-rows').innerHTML=
      `<div class="r status"><span class="lbl">Статус</span><span class="badge ${stCls}"><span class="dot"></span>${stName}</span></div>`+
      `<div class="r"><div class="lbl">Сигнал</div><div class="sig">${sig}</div></div>`+
      `<div class="r"><div class="lbl">Прогноз</div><div class="fore">${fore}${foreSub?`<div class="sub">${foreSub}</div>`:''}</div></div>`;

    /* ===== QDTE ===== */
    $('qd-nums').innerHTML=(qdCur?`QDTE <b>${fmt(qdCur)}</b> <span class="ref">(справочно)</span> · `:'')+`ADX ${adx.toFixed(1)} · CHOP ${chop.toFixed(1)}`;
    $('qd-therm').innerHTML=thermQDTE(ath,cur);

    // статус QDTE = тот же цвет от просадки
    let qName=stName,qCls=stCls;
    // выплаты: реинвест выше −5,3%, иначе SGOV
    const reinvest=dd>DD.yellow;
    // сигнал по фазе позиции QDTE
    const qs=$('qstate').value;let qsig,qfore,qforeSub='';
    if(qs==='FULL'){
      if(dd>DD.yellow){qsig=`В QDTE 100%. <span class="soft">Выплаты реинвестируются</span>`;
        qfore=`Выплаты в защитный актив при QQQ — <span class="price">${fmt(L.yellow)}</span>`;}
      else if(dd>DD.exit){qsig=`В QDTE 100%. <span class="soft">Выплаты в защитный актив (SGOV)</span>`;
        qfore=`Выход в защитный актив 50% при QQQ — <span class="price">${fmt(L.exit)}</span>`;}
      else{qsig=`<span class="soft">Достигнут красный уровень.</span> Выход в защитный актив 50%`;
        qfore=`Выход в защитный актив 100% при QQQ — <span class="price">${fmt(L.bear)}</span>`;}
    }else if(qs==='HALF'){
      const okBack=curW>L.exit&&adx>25&&chop<45;
      if(dd<=DD.bear){qsig=`<span class="soft">Достигнут медвежий уровень.</span> Выход в защитный актив 100%`;}
      else if(okBack){qsig=`Выход в защитный актив 50%. <span class="soft">Условия возврата остатка выполнены — вернуть остаток в QDTE</span>`;}
      else{qsig=`Выход в защитный актив 50%. <span class="soft">Ждём возврат остатка (закрытие выше −11,2% + ADX&gt;25 + CHOP&lt;45)</span>`;}
      qfore=`возврат остатка при закрытии выше QQQ — <span class="price">${fmt(L.exit)}</span>`;
    }else{ // OUT
      const okBack1=curW>L.bear&&adx>25&&chop<45;
      if(okBack1){qsig=`Выход в защитный актив 100%. <span class="soft">Условия первого транша выполнены — вернуть 50% в QDTE</span>`;}
      else{qsig=`Выход в защитный актив 100%. <span class="soft">Ждём возврат 50% (закрытие выше −20% + ADX&gt;25 + CHOP&lt;45)</span>`;}
      qfore=`возврат 50% при закрытии выше QQQ — <span class="price">${fmt(L.bear)}</span>, затем остаток выше ${fmt(L.exit)}`;
    }
    $('qd-rows').innerHTML=
      `<div class="r status"><span class="lbl">Статус</span><span class="badge ${qCls}"><span class="dot"></span>${qName}</span></div>`+
      `<div class="r"><div class="lbl">Сигнал</div><div class="sig">${qsig}</div></div>`+
      `<div class="r"><div class="lbl">Прогноз</div><div class="fore">${qfore}${qforeSub?`<div class="sub">${qforeSub}</div>`:''}</div></div>`;

    // здоровье выплат
    let hHtml;
    if(qdDivs&&qdDivs.length>=1){
      const lastD=qdDivs[qdDivs.length-1].a;
      const prev=qdDivs.slice(Math.max(0,qdDivs.length-4),qdDivs.length-1);
      const avg=prev.length?prev.reduce((s,x)=>s+x.a,0)/prev.length:lastD;
      const delta=100*(lastD/avg-1);
      let cls,lab;
      if(prev.length<2){cls='bs-warn';lab='мало данных';}
      else if(delta<=-25){cls='bs-red';lab='падение';}
      else if(delta>=10){cls='bs-ok';lab='рост';}
      else{cls='bs-ok';lab='норма';}
      hHtml=`<div class="health-head"><span class="t">Здоровье фонда · тренд выплат</span><span class="badge ${cls}"><span class="dot"></span>${lab}</span></div>`+
        `<div class="health-cells">`+
        `<div class="hc"><div class="n">$${lastD.toFixed(4)}</div><div class="c">последняя</div></div>`+
        `<div class="hc"><div class="n">$${avg.toFixed(4)}</div><div class="c">средняя (${prev.length||1})</div></div>`+
        `<div class="hc"><div class="n" style="color:${delta<=-25?'var(--red)':'var(--ok)'}">${delta>=0?'+':''}${delta.toFixed(1)}%</div><div class="c">отклонение</div></div>`+
        `</div><div style="font-size:.8rem;color:var(--muted);margin-top:11px">Тревога при падении &gt;25% к средней и снижающейся цене пая. Порог −25% — инженерная оценка.</div>`;
    }else{
      hHtml=`<div class="health-head"><span class="t">Здоровье фонда · тренд выплат</span><span class="badge bs-warn"><span class="dot"></span>нет данных</span></div>`+
        `<div style="font-size:.9rem;color:var(--sec)">История выплат QDTE недоступна. Вносите выплаты в журнал вручную.</div>`;
    }
    $('qd-health').innerHTML=hHtml;

    if(Math.abs(dd)<=0.1){$('warnbar').style.display='';$('warnbar').textContent='QQQ на новом максимуме: пересчитать уровни, переставить алерты.';}
    $('out').style.display='';
  }catch(e){log('ОШИБКА: '+e.message);$('warnbar').style.display='';$('warnbar').textContent='Ошибка: '+e.message;$('meta').textContent='ошибка загрузки';}
}

// автозапуск при открытии страницы; обновление — перезагрузкой (F5)
runAdvisor().then(()=>{window.__loaded=true;});
</script>
</body>
