<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbell · TQQQ + QDTE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#FFFFFF;
    --ink:#1a1a1a;
    --muted:#9a9a9a;

    --blue:#00A4EF;
    --gex-y:#FFB900;   --gex-ink:#6E4A00;
    --green:#7FBA00;
    --emerald:#00A300;
    --gold:#F0B400;
    --dviolet:#6A00CC;
    --violet:#7550BE;
    --lime:#9DBE2E;
    --gold2:#E3C800;

    --cell:112px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--page);
    font-family:'Space Grotesk',system-ui,sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding:40px 20px;
  }
  .wrap{max-width:712px;margin:0 auto}

  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px}
  .head h1{font-size:26px;font-weight:300;margin:0;letter-spacing:.01em}
  .mark{
    width:26px;height:26px;flex:none;align-self:center;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;
  }
  .mark span{display:block}
  .mark .s1{background:#F25022}
  .mark .s2{background:#7FBA00}
  .mark .s3{background:#00A4EF}
  .mark .s4{background:#FFB900}

  .grid{
    display:grid;
    grid-template-columns:repeat(6,var(--cell));
    grid-template-rows:repeat(3,var(--cell));
    gap:8px;
    justify-content:center;
  }

  .tile{
    position:relative;
    display:flex;flex-direction:column;
    text-decoration:none;
    border-radius:0;
    transition:filter .12s ease, transform .12s ease;
  }
  a.tile:hover{filter:brightness(1.07);transform:translateY(-1px)}
  a.tile:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

  .glyph{
    flex:1;display:flex;align-items:center;justify-content:center;
    font-weight:700;color:#fff;
  }
  .cap{
    position:absolute;left:12px;bottom:9px;
    font-size:12px;font-weight:500;color:#fff;
  }
  .sub{
    position:absolute;left:12px;bottom:26px;
    font-size:10px;color:rgba(255,255,255,.78);
  }

  .t-main{grid-column:1/3;grid-row:1/3;background:var(--blue)}
  .t-main .glyph{font-size:52px}
  .t-gex{grid-column:5/7;grid-row:1;background:var(--gex-y)}
  .t-gex .glyph{font-size:30px;color:var(--gex-ink)}
  .t-gex .cap{color:var(--gex-ink)}
  .t-gex .sub{color:rgba(90,60,0,.8)}
  .t-bottom{grid-column:3/5;grid-row:3;background:var(--green)}
  .t-bottom .glyph{font-size:30px}

  .deco{border-radius:0}
  .d-emerald{grid-column:3/5;grid-row:1;background:var(--emerald)}
  .d-gold{grid-column:3;grid-row:2;background:var(--gold)}
  .d-blue1{grid-column:4;grid-row:2;background:var(--blue)}
  .d-dviolet{grid-column:5/7;grid-row:2;background:var(--dviolet)}
  .d-lime{grid-column:1;grid-row:3;background:var(--lime)}
  .d-violet{grid-column:2;grid-row:3;background:var(--violet)}
  .d-blue2{grid-column:6;grid-row:3;background:var(--blue)}

  .cluster{
    grid-column:5;grid-row:3;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;
  }
  .cluster span{display:block}
  .cluster .c1{background:var(--gold2)}
  .cluster .c2{background:var(--emerald)}
  .cluster .c3{background:var(--blue)}
  .cluster .c4{background:var(--violet)}

  .foot{display:flex;align-items:center;gap:8px;margin-top:22px;justify-content:center}
  .foot .dot{width:7px;height:7px;background:var(--gex-y);flex:none}
  .foot > span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

  @media (max-width:780px){
    :root{--cell:calc((100vw - 80px)/6)}
    .t-main .glyph{font-size:38px}
    .t-gex .glyph,.t-bottom .glyph{font-size:22px}
    .sub{display:none}
    .cap{font-size:10.5px;left:9px;bottom:7px}
  }
  @media (max-width:520px){
    :root{--cell:calc((100vw - 48px)/2)}
    .grid{
      grid-template-columns:repeat(2,var(--cell));
      grid-template-rows:repeat(8,var(--cell));
    }
    .sub{display:block}
    .cap{font-size:12px;left:12px;bottom:9px}
    .t-main{grid-column:1/3;grid-row:1/3}
    .t-main .glyph{font-size:52px}
    .t-gex{grid-column:1/3;grid-row:3}
    .t-bottom{grid-column:1/3;grid-row:4}
    .t-gex .glyph,.t-bottom .glyph{font-size:30px}
    .d-violet{grid-column:1;grid-row:5}
    .d-gold{grid-column:2;grid-row:5}
    .d-lime{grid-column:1;grid-row:6}
    .d-blue1{grid-column:2;grid-row:6}
    .d-dviolet{grid-column:1;grid-row:7}
    .d-emerald{grid-column:2;grid-row:7}
    .cluster{grid-column:1;grid-row:8}
    .d-blue2{grid-column:2;grid-row:8}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="head">
    <h1>Trading Tools</h1>
    <div class="mark" aria-hidden="true">
      <span class="s1"></span><span class="s2"></span>
      <span class="s3"></span><span class="s4"></span>
    </div>
  </div>

  <div class="grid">

    <a class="tile t-main" href="advisor.html">
      <div class="glyph">С</div>
      <div class="sub">пятничная проверка крыльев</div>
      <div class="cap">Main Strategy</div>
    </a>

    <div class="deco d-emerald" aria-hidden="true"></div>

    <a class="tile t-gex" href="gex.html">
      <div class="glyph">G</div>
      <div class="sub">уровни дилеров · zero-gamma</div>
      <div class="cap">GEX — дилерская гамма</div>
    </a>

    <div class="deco d-gold" aria-hidden="true"></div>
    <div class="deco d-blue1" aria-hidden="true"></div>
    <div class="deco d-dviolet" aria-hidden="true"></div>
    <div class="deco d-lime" aria-hidden="true"></div>
    <div class="deco d-violet" aria-hidden="true"></div>

    <a class="tile t-bottom" href="bottom.html">
      <div class="glyph">Д</div>
      <div class="sub">сигналы капитуляции</div>
      <div class="cap">Индикатор дна</div>
    </a>

    <div class="cluster" aria-hidden="true">
      <span class="c1"></span><span class="c2"></span>
      <span class="c3"></span><span class="c4"></span>
    </div>

    <div class="deco d-blue2" aria-hidden="true"></div>

  </div>

  <div class="foot">
    <span class="dot" aria-hidden="true"></span>
    <span>данные Tiingo · обновление по закрытию недели</span>
  </div>

</div>
</body>
</html>
